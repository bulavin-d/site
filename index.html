<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Official</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background: var(--bg);
            color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ФОН С БЛЮРОМ */
        .bg-glow {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.2);
            transform: scale(1.2); z-index: -1;
            transition: background-image 1s ease;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        /* АВАТАР И ИМЯ */
        .profile { text-align: center; margin-bottom: 10px; }
        .avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .profile h1 { font-size: 32px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
        .profile p { font-size: 13px; opacity: 0.5; margin-top: 10px; line-height: 1.5; }

        /* КНОПКИ */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 24px;
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.3);
        }

        /* РАЗДЕЛИТЕЛЬ */
        .divider {
            padding: 12px;
            background: var(--glass);
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .full-width { grid-column: span 2; background: rgba(255,255,255,0.08); }

        .footer { text-align: center; margin-top: 40px; font-size: 10px; opacity: 0.2; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="bg-glow" id="bg"></div>

<div class="app">
    <div class="profile">
        <img src="" alt="" class="avatar" id="avatar" style="display: none;">
        <h1 id="name">BULAVIN</h1>
        <p id="bio"></p>
    </div>

    <div class="grid" id="social-grid"></div>

    <div class="divider">music platforms</div>

    <div class="grid" id="music-grid"></div>

    <div class="footer">
        © <span id="year"></span> BULAVIN SYSTEM
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    function parseCSV(text) {
        return text.split('\n').map(row => {
            const cells = [];
            let cell = '';
            let inQuotes = false;
            for (let char of row) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ''; }
                else cell += char;
            }
            cells.push(cell.trim());
            return cells;
        });
    }

    fetch(CSV_URL)
        .then(res => res.text())
        .then(data => {
            const rows = parseCSV(data);
            const d = rows[1]; // Строка 2 с твоими данными
            if(!d) return;

            // ДАННЫЕ ИЗ ТВОЕЙ ТАБЛИЦЫ
            document.getElementById('name').textContent = d[0] || "BULAVIN";
            document.getElementById('bio').textContent = d[1] || "";
            
            const photoUrl = d[7]; 
            if(photoUrl) {
                const img = document.getElementById('avatar');
                img.src = photoUrl;
                img.style.display = 'inline-block';
                document.getElementById('bg').style.backgroundImage = `url('${photoUrl}')`;
            }

            const socialGrid = document.getElementById('social-grid');
            const musicGrid = document.getElementById('music-grid');

            // Конфиг кнопок (Имя, Ссылка, Иконка)
            const socials = [
                {n: 'Telegram', l: d[2], i: '✈️'},
                {n: 'Instagram', l: d[3], i: '📸'}
            ];

            const music = [
                {n: 'Yandex Music', l: d[4], i: '💛'},
                {n: 'Spotify', l: d[5], i: '🎧'},
                {n: 'YouTube', l: d[6], i: '📺'}
            ];

            socials.forEach(s => {
                if(s.l && s.l.length > 5) {
                    const a = document.createElement('a');
                    a.className = 'btn';
                    a.href = s.l; a.target = '_blank';
                    a.innerHTML = `<span>${s.i}</span> ${s.n}`;
                    socialGrid.appendChild(a);
                }
            });

            music.forEach(m => {
                if(m.l && m.l.length > 5) {
                    const a = document.createElement('a');
                    a.className = 'btn full-width';
                    a.href = m.l; a.target = '_blank';
                    a.innerHTML = `<span>${m.i}</span> ${m.n}`;
                    musicGrid.appendChild(a);
                }
            });
        })
        .catch(err => console.error("Ошибка загрузки данных:", err));
</script>

</body>
</html>
