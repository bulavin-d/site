<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Official</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        /* Динамический фон */
        #bg {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.2);
            transform: scale(1.1); z-index: -1;
            transition: 1s ease;
            background-color: #050505;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        /* Главная карточка */
        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .avatar {
            width: 120px; height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            background: #222;
        }

        h1 { font-size: 32px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; font-weight: 800; }
        .bio { font-size: 14px; opacity: 0.5; line-height: 1.6; font-weight: 400; }

        /* Сетка кнопок */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 22px;
            text-decoration: none;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.4);
        }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 40px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="bg"></div>

<div class="container">
    <div class="card">
        <img src="" alt="" class="avatar" id="photo" style="display: none;">
        <h1 id="name">BULAVIN</h1>
        <p class="bio" id="bio"></p>
    </div>

    <div class="links" id="links-container">
        </div>

    <div class="footer">
        © 2026 BULAVIN SYSTEM PRODUCTION
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    async function init() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            
            // Чистим данные от лишних символов
            const rows = data.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
            const headers = rows[0];
            const val = rows[1];

            if (!val) return;

            // Находим данные по заголовкам (чтобы не путать столбцы)
            const name = val[headers.indexOf('Псевдоним')] || "BULAVIN";
            const bio = val[headers.indexOf('БИО')] || "";
            const photo = val[headers.indexOf('PHOTO')] || "";

            document.getElementById('name').textContent = name;
            document.getElementById('bio').textContent = bio;

            // Обработка фото
            if (photo && photo.startsWith('http')) {
                const img = document.getElementById('photo');
                img.src = photo;
                img.style.display = 'block';
                document.getElementById('bg').style.backgroundImage = `url('${photo}')`;
            }

            // Создание кнопок для всех ссылок
            const container = document.getElementById('links-container');
            const platforms = ['Telegram', 'Instagram', 'Yandex Music', 'Spotify', 'YouTube'];

            platforms.forEach(p => {
                const idx = headers.indexOf(p);
                if (idx !== -1 && val[idx] && val[idx].startsWith('http')) {
                    const a = document.createElement('a');
                    a.className = 'btn';
                    a.href = val[idx];
                    a.target = '_blank';
                    a.textContent = p.toUpperCase();
                    container.appendChild(a);
                }
            });

        } catch (e) {
            console.error("Ошибка загрузки:", e);
        }
    }

    init();
</script>

</body>
</html>
