<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN</title>

    <link rel="icon" href="https://em-content.zobj.net/source/apple/354/black-heart_1f5a4.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --verify-blue: #0095f6;
            --yandex-color: #ffcc00;
            --vk-color: #0077ff;
            --spotify-color: #1ed760;
            --apple-color: #fc3c44;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .dynamic-bg {
            position: fixed; inset: 0;
            background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center;
            background-size: cover;
            filter: blur(80px) brightness(0.2);
            transform: scale(1.1); z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 5;
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 10px;
        }

        .avatar-wrapper {
            width: 100px; height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px;
        }

        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .name-wrapper {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-bottom: 8px;
        }

        h1 { font-size: 24px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
        .verify-icon { width: 18px; height: 18px; fill: var(--verify-blue); }
        .bio { font-size: 12px; opacity: 0.6; text-align: center; line-height: 1.4; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .btn {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 18px; border-radius: 20px;
            text-decoration: none; color: #fff;
            font-size: 13px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .btn-content {
            position: relative;
            z-index: 2; /* Поверх канваса */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Клик проходит сквозь на саму кнопку */
        }

        .btn i { position: absolute; left: 20px; font-size: 18px; }
        .btn:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }

        .music-trigger {
            margin-top: 5px;
            letter-spacing: 2px;
        }

        #smoke-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
            filter: blur(12px);
            -webkit-filter: blur(12px);
            transform: translate3d(0,0,0); 
        }

        .music-collapse-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .music-collapse-wrapper.show {
            grid-template-rows: 1fr;
        }

        .music-list {
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .music-list .btn:first-child {
            margin-top: 10px; 
        }

        .btn-yandex:hover { color: var(--yandex-color); box-shadow: inset 0 0 20px rgba(255, 204, 0, 0.15); }
        .btn-vk:hover { color: var(--vk-color); box-shadow: inset 0 0 20px rgba(0, 119, 255, 0.15); }
        .btn-spotify:hover { color: var(--spotify-color); box-shadow: inset 0 0 20px rgba(30, 215, 96, 0.15); }
        .btn-apple:hover { color: var(--apple-color); box-shadow: inset 0 0 20px rgba(252, 60, 68, 0.15); }

        .full { grid-column: span 2; }

        .prediction-wrapper { position: relative; width: 100%; margin-top: 15px; }
        .prediction-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 25px;
            backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .prediction-header {
            font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 15px; color: var(--verify-blue); font-weight: 800; opacity: 0.8;
        }

        .prediction-text { font-size: 15px; line-height: 1.6; font-weight: 400; color: #fff; }

        #magic-canvas {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120%; height: 150%; z-index: 1; pointer-events: none;
        }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 30px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="dynamic-bg"></div>

<div class="container">
    <div class="profile-card">
        <div class="avatar-wrapper">
            <img src="https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000" alt="BULAVIN" class="avatar">
        </div>
        <div class="name-wrapper">
            <h1>BULAVIN</h1>
            <svg class="verify-icon" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6c.154-.435.238-.905.238-1.4c0-2.21-1.71-3.998-3.818-3.998c-.47 0-.92.084-1.336.25C14.818 2.415 13.51 1.5 12 1.5s-2.816.917-3.437 2.25c-.415-.165-.866-.25-1.336-.25c-2.11 0-3.818 1.79-3.818 4c0 .494.083.964.237 1.4c-1.272.65-2.147 2.02-2.147 3.6c0 1.58.875 2.95 2.147 3.6c-.154.435-.237.905-.237 1.4c0 2.21 1.71 4 3.818 4c.47 0 .92-.084 1.335-.25c.62 1.334 1.926 2.25 3.437 2.25s2.817-.916 3.437-2.25c.415.165.865.25 1.336.25c2.11 0 3.818-1.79 3.818-4c0-.495-.084-.965-.238-1.4c1.273-.65 2.148-2.02 2.148-3.6zm-12.42 5.393l-4.104-4.103l1.591-1.592l2.513 2.513l6.45-6.45l1.59 1.592l-8.04 8.04z"/></svg>
        </div>
        <p class="bio">Казахстанский исполнитель и музыкальный продюсер.</p>
    </div>

    <div class="grid">
        <a href="https://t.me/imbulavin" target="_blank" class="btn">
            <i class="fa-brands fa-telegram"></i><span>Telegram</span>
        </a>
        <a href="https://www.instagram.com/lu4danya" target="_blank" class="btn">
            <i class="fa-brands fa-instagram"></i><span>Instagram</span>
        </a>
    </div>

    <div class="btn full music-trigger" id="music-btn">
        <canvas id="smoke-canvas"></canvas>
        <div class="btn-content">
            <i class="fa-solid fa-headphones"></i>
            <span>СЛУШАТЬ МУЗЫКУ</span>
        </div>
    </div>

    <div class="music-collapse-wrapper" id="music-wrapper">
        <div class="music-list">
            <a href="https://music.yandex.kz/artist/24009925" target="_blank" class="btn full btn-yandex">
                <i class="fa-solid fa-compact-disc"></i><span>Yandex Music</span>
            </a>
            <a href="https://vk.com/artist/bulavin" target="_blank" class="btn full btn-vk">
                <i class="fa-brands fa-vk"></i><span>VK Music</span>
            </a>
            <a href="https://open.spotify.com/artist/7Efya7yCpL4M7BPdcm6qUq" target="_blank" class="btn full btn-spotify">
                <i class="fa-brands fa-spotify"></i><span>Spotify</span>
            </a>
            <a href="https://music.apple.com/ru/artist/bulavin/1805904899" target="_blank" class="btn full btn-apple">
                <i class="fa-brands fa-apple"></i><span>Apple Music</span>
            </a>
        </div>
    </div>

    <div class="prediction-wrapper">
        <canvas id="magic-canvas"></canvas>
        <div class="prediction-card">
            <div class="prediction-header">BULAVIN SYSTEM • БАЗА ДНЯ</div>
            <div id="prediction" class="prediction-text">Подключаюсь...</div>
        </div>
    </div>

    <div class="footer">© 2026 BULAVIN</div>
</div>

<script>
    const musicBtn = document.getElementById('music-btn');
    const musicWrapper = document.getElementById('music-wrapper');
    
    musicBtn.addEventListener('click', () => {
        musicWrapper.classList.toggle('show');
    });

    const sCanvas = document.getElementById('smoke-canvas');
    const sCtx = sCanvas.getContext('2d');
    let smokeParticles = [];

    function resizeSmoke() {
        sCanvas.width = sCanvas.offsetWidth;
        sCanvas.height = sCanvas.offsetHeight;
    }

    class SmokeParticle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * sCanvas.width;
            this.y = Math.random() * sCanvas.height;
            this.size = Math.random() * 25 + 15;
            this.opacity = Math.random() * 0.4;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < -30 || this.x > sCanvas.width + 30) this.vx *= -1;
            if (this.y < -30 || this.y > sCanvas.height + 30) this.vy *= -1;
        }
        draw() {
            sCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            sCtx.beginPath(); sCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); sCtx.fill();
        }
    }

    function animateSmoke() {
        sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
        smokeParticles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateSmoke);
    }

    window.addEventListener('resize', resizeSmoke);
    resizeSmoke();
    for(let i=0; i<15; i++) smokeParticles.push(new SmokeParticle());
    animateSmoke();

    async function fetchPrediction() {
        const textEl = document.getElementById('prediction');
        try {
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://fucking-great-advice.ru/api/random'));
            const data = await response.json();
            const advice = JSON.parse(data.contents);
            textEl.innerText = advice.text;
        } catch (e) {
            textEl.innerText = "Делай то, что любишь. Остальное подтянется.";
        }
    }

    const canvas = document.getElementById('magic-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function initCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = Math.random() * 0.3 - 0.15;
            this.speedY = Math.random() * 0.3 - 0.15;
            this.opacity = Math.random() * 0.3;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = `rgba(0, 149, 246, ${this.opacity})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();
    for(let i=0; i<30; i++) particles.push(new Particle());
    animate();
    fetchPrediction();
</script>
