<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = true;
    function openAuth(l) { isLoginMode = l; document.getElementById('authTitle').innerText = l ? 'LOGIN' : 'REGISTER'; document.getElementById('authModal').classList.add('show'); }
    function closeAuth() { document.getElementById('authModal').classList.remove('show'); }

    async function executeAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        if (isLoginMode) {
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else window.location.href = 'dashboard.html';
        } else {
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) alert(error.message); else alert('Готово! Теперь нажми LOGIN и войди.');
        }
    }

    document.getElementById('music-btn').onclick = () => document.getElementById('music-wrapper').classList.toggle('show');

    // Эмодзи фон
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = Array.from({length: 15}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        s: Math.random() * 20 + 10, v: Math.random() * 0.5 + 0.2,
        e: ['🖤', '🎧', '🎸'][Math.floor(Math.random() * 3)]
    }));
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => {
            ctx.globalAlpha = 0.2; ctx.font = p.s + "px serif"; ctx.fillText(p.e, p.x, p.y);
            p.y += p.v; if(p.y > canvas.height) p.y = -20;
        });
        requestAnimationFrame(draw);
    }
    draw();

    fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://fucking-great-advice.ru/api/random'))
        .then(r => r.json()).then(d => { document.getElementById('prediction').innerText = JSON.parse(d.contents).text; })
        .catch(() => { document.getElementById('prediction').innerText = "Делай музыку."; });
</script>
