<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Official Site</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --bg-dark: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 10;
        }

        .dynamic-bg {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.3);
            transform: scale(1.2); z-index: -1;
            transition: background-image 1s ease-in-out;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
        }

        .avatar-wrapper {
            width: 140px; height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .profile-card h1 { font-size: 28px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 900; }
        .profile-card p { font-size: 14px; opacity: 0.6; line-height: 1.5; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .social-link {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; /* Для позиционирования иконки */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ИКОНКА СЛЕВА */
        .btn-logo {
            position: absolute;
            left: 20px;
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1); /* Делает логотипы чисто белыми */
            opacity: 0.7;
            object-fit: contain;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.03) translateY(-3px);
            border-color: rgba(255,255,255,0.3);
        }

        .social-link:hover .btn-logo { opacity: 1; }

        .divider {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        .full-width {
            grid-column: span 2;
            background: rgba(255,255,255,0.08);
        }

        .footer { text-align: center; font-size: 11px; opacity: 0.3; margin-top: 20px; letter-spacing: 1px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container > * { animation: fadeIn 0.8s ease forwards; }
    </style>
</head>
<body>

<div class="dynamic-bg" id="bg"></div>

<div class="container">
    <div class="profile-card">
        <div class="avatar-wrapper">
            <img src="" alt="BULAVIN" class="avatar" id="user-photo">
        </div>
        <h1 id="user-name">...</h1>
        <p id="user-bio"></p>
    </div>

    <div class="grid" id="social-grid"></div>
    <div class="divider">Music Platforms</div>
    <div class="grid" id="music-grid"></div>

    <div class="footer">
        © <span id="year"></span> BULAVIN SYSTEM PRODUCTION
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    function parseCSV(text) {
        const rows = text.split('\r\n');
        return rows.map(row => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const char = row[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        });
    }

    fetch(CSV_URL)
        .then(res => res.text())
        .then(data => {
            const rows = parseCSV(data);
            const p = rows[1]; 

            if (!p || p.length < 2) return;

            document.getElementById('user-name').textContent = p[0].replace(/^"|"$/g, '');
            document.getElementById('user-bio').textContent = p[1].replace(/^"|"$/g, '');
            
            const photo = p[7] ? p[7].replace(/^"|"$/g, '') : '';
            if (photo) {
                document.getElementById('user-photo').src = photo;
                document.getElementById('bg').style.backgroundImage = `url('${photo}')`;
            }

            const socGrid = document.getElementById('social-grid');
            const musGrid = document.getElementById('music-grid');

            // Конфиг с ссылками на SVG логотипы
            const socials = [
                { name: 'Telegram', link: p[2], logo: 'https://www.svgrepo.com/show/354443/telegram-icon.svg' },
                { name: 'Instagram', link: p[3], logo: 'https://www.svgrepo.com/show/353915/instagram-icon.svg' }
            ];

            const music = [
                { name: 'Yandex Music', link: p[4], logo: 'https://www.svgrepo.com/show/331652/yandex-music.svg' },
                { name: 'Spotify', link: p[5], logo: 'https://www.svgrepo.com/show/475684/spotify-color.svg' },
                { name: 'YouTube', link: p[6], logo: 'https://www.svgrepo.com/show/475697/youtube-color.svg' }
            ];

            socials.forEach(s => {
                let cleanLink = s.link ? s.link.replace(/^"|"$/g, '') : '';
                if (cleanLink.length > 5) {
                    const el = document.createElement('a');
                    el.className = 'social-link';
                    el.href = cleanLink;
                    el.target = '_blank';
                    el.innerHTML = `<img src="${s.logo}" class="btn-logo"><span>${s.name}</span>`;
                    socGrid.appendChild(el);
                }
            });

            music.forEach(m => {
                let cleanLink = m.link ? m.link.replace(/^"|"$/g, '') : '';
                if (cleanLink.length > 5) {
                    const el = document.createElement('a');
                    el.className = 'social-link full-width';
                    el.href = cleanLink;
                    el.target = '_blank';
                    el.innerHTML = `<img src="${m.logo}" class="btn-logo"><span>${m.name}</span>`;
                    musGrid.appendChild(el);
                }
            });
        });
</script>

</body>
</html>
