<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Official Site</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --bg-dark: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 10;
        }

        .dynamic-bg {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.3);
            transform: scale(1.2); z-index: -1;
            transition: background-image 1s ease-in-out;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
        }

        .avatar-wrapper {
            width: 140px; height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            position: relative;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .profile-card h1 { font-size: 28px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .profile-card p { font-size: 14px; opacity: 0.6; line-height: 1.5; }

        /* СЕТКА */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        /* ТВОЙ СТИЛЬ КНОПОК */
        .social-link {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-link:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05) translateY(-5px);
            border-color: rgba(255,255,255,0.3);
        }

        /* СТЕКЛЯННЫЙ РАЗДЕЛИТЕЛЬ */
        .divider {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        /* МУЗЫКАЛЬНЫЕ КНОПКИ ШИРОКИЕ */
        .full-width {
            grid-column: span 2;
            background: rgba(255,255,255,0.08);
        }

        .footer { text-align: center; font-size: 11px; opacity: 0.3; margin-top: 20px; letter-spacing: 1px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container > * { animation: fadeIn 0.8s ease forwards; }
    </style>
</head>
<body>

<div class="dynamic-bg" id="bg"></div>

<div class="container">
    <div class="profile-card">
        <div class="avatar-wrapper">
            <img src="" alt="BULAVIN" class="avatar" id="user-photo">
        </div>
        <h1 id="user-name">Загрузка...</h1>
        <p id="user-bio"></p>
    </div>

    <div class="grid" id="social-grid"></div>

    <div class="divider">Music Platforms</div>

    <div class="grid" id="music-grid"></div>

    <div class="footer">
        © <span id="year"></span> BULAVIN SYSTEM PRODUCTION
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    function parseCSV(text) {
        const rows = text.split('\n');
        return rows.map(row => {
            const cells = [];
            let cell = '';
            let inQuotes = false;
            for (let char of row) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ''; }
                else cell += char;
            }
            cells.push(cell.trim());
            return cells;
        });
    }

    fetch(CSV_URL)
        .then(res => res.text())
        .then(data => {
            const rows = parseCSV(data);
            const p = rows[1];

            if (!p) return;

            document.getElementById('user-name').textContent = p[0];
            document.getElementById('user-bio').textContent = p[1];
            
            if (p[7]) {
                document.getElementById('user-photo').src = p[7];
                document.getElementById('bg').style.backgroundImage = `url('${p[7]}')`;
            }

            const socGrid = document.getElementById('social-grid');
            const musGrid = document.getElementById('music-grid');

            // Соцсети (в сетку 2x2)
            const socials = [
                { name: 'Telegram', link: p[2], icon: '✈️' },
                { name: 'Instagram', link: p[3], icon: '📸' }
            ];

            // Музыка (широкие)
            const music = [
                { name: 'Yandex Music', link: p[4], icon: '💛' },
                { name: 'Spotify', link: p[5], icon: '🎧' },
                { name: 'YouTube', link: p[6], icon: '📺' }
            ];

            socials.forEach(s => {
                if (s.link && s.link.length > 5) {
                    const el = document.createElement('a');
                    el.className = 'social-link';
                    el.href = s.link;
                    el.target = '_blank';
                    el.innerHTML = `<span>${s.icon}</span> ${s.name}`;
                    socGrid.appendChild(el);
                }
            });

            music.forEach(m => {
                if (m.link && m.link.length > 5) {
                    const el = document.createElement('a');
                    el.className = 'social-link full-width';
                    el.href = m.link;
                    el.target = '_blank';
                    el.innerHTML = `<span>${m.icon}</span> ${m.name}`;
                    musGrid.appendChild(el);
                }
            });
        });
</script>

</body>
</html>
