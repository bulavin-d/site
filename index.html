<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Official</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --verify-blue: #0095f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Текстура шума */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 2;
        }

        /* Задний фон (блюр из фото) */
        .dynamic-bg {
            position: fixed; inset: 0;
            background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center;
            background-size: cover;
            filter: blur(80px) brightness(0.2);
            transform: scale(1.1); z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1;
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 10px;
        }

        .avatar-wrapper {
            width: 120px; height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px;
        }

        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Имя и синяя галочка */
        .name-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        h1 { font-size: 26px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }

        .verify-icon {
            width: 20px; height: 20px;
            fill: var(--verify-blue);
            filter: drop-shadow(0 0 5px rgba(0, 149, 246, 0.4));
        }
        
        /* БИО В ОДНУ СТРОКУ */
        .bio { 
            font-size: 12px; 
            opacity: 0.6; 
            white-space: nowrap; 
            letter-spacing: 0.5px;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .btn {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease;
        }

        .btn-icon {
            position: absolute; left: 18px;
            width: 18px; height: 18px;
            fill: #fff;
        }

        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        .divider {
            padding: 10px; text-align: center; font-size: 9px;
            letter-spacing: 3px; color: rgba(255,255,255,0.2);
            text-transform: uppercase; font-weight: 800;
        }

        .full { grid-column: span 2; }
        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 30px; letter-spacing: 2px; }
    </style>
</head>
