<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Official</title>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body {
            background: var(--bg);
            color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ЗЕРНИСТЫЙ ФОН */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 10;
        }

        .bg-glow {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(120px) brightness(0.25);
            transform: scale(1.4); z-index: -1;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        /* ПРОФИЛЬ */
        .profile { text-align: center; margin-bottom: 20px; }
        .avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .profile h1 { font-size: 32px; letter-spacing: 6px; text-transform: uppercase; font-weight: 900; }
        .profile p { font-size: 12px; opacity: 0.4; margin-top: 8px; letter-spacing: 1px; line-height: 1.6; }

        /* СЕТКА КНОПОК */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 22px;
            border-radius: 24px;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-4px) scale(1.02);
        }

        /* СТЕКЛЯННЫЙ РАЗДЕЛИТЕЛЬ */
        .divider {
            margin: 15px 0;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            text-align: center;
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }

        .footer { text-align: center; margin-top: 50px; font-size: 10px; opacity: 0.15; letter-spacing: 2px; }

        /* ВТОРОЙ БЛОК (ПЛОЩАДКИ) */
        .music-btn {
            grid-column: span 2;
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="bg-glow" id="bg"></div>

<div class="app">
    <div class="profile">
        <img src="" alt="" class="avatar" id="avatar">
        <h1 id="name">BULAVIN</h1>
        <p id="bio"></p>
    </div>

    <div class="grid" id="social-grid"></div>

    <div class="divider">music platforms</div>

    <div class="grid" id="music-grid"></div>

    <div class="footer">
        © <span id="year"></span> BULAVIN SYSTEM
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    function parseCSV(text) {
        return text.split('\n').map(row => {
            const cells = [];
            let cell = '';
            let inQuotes = false;
            for (let char of row) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ''; }
                else cell += char;
            }
            cells.push(cell.trim());
            return cells;
        });
    }

    fetch(CSV_URL)
        .then(res => res.text())
        .then(data => {
            const rows = parseCSV(data);
            const d = rows[1];
            if(!d) return;

            // Заполнение профиля
            document.getElementById('name').textContent = d[0];
            document.getElementById('bio').textContent = d[1];
            document.getElementById('avatar').src = d[7];
            document.getElementById('bg').style.backgroundImage = `url('${d[7]}')`;

            const socialGrid = document.getElementById('social-grid');
            const musicGrid = document.getElementById('music-grid');

            // СОЦСЕТИ (Берем Telegram и Instagram)
            const socials = [
                {n: 'Telegram', l: d[2]},
                {n: 'Instagram', l: d[3]}
            ];

            // ПЛОЩАДКИ (Яндекс, Spotify, YouTube)
            const platforms = [
                {n: 'Yandex Music', l: d[4]},
                {n: 'Spotify', l: d[5]},
                {n: 'YouTube', l: d[6]}
            ];

            socials.forEach(s => {
                if(s.l && s.l.length > 5) {
                    const a = document.createElement('a');
                    a.className = 'btn';
                    a.href = s.l; a.target = '_blank'; a.textContent = s.n;
                    socialGrid.appendChild(a);
                }
            });

            platforms.forEach(p => {
                if(p.l && p.l.length > 5) {
                    const a = document.createElement('a');
                    a.className = 'btn music-btn';
                    a.href = p.l; a.target = '_blank'; a.textContent = p.n;
                    musicGrid.appendChild(a);
                }
            });
        });
</script>

</body>
</html>
