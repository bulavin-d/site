<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Official</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background: #000; color: #fff; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            overflow-x: hidden;
        }

        /* Задний фон с размытием */
        #bg {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.25);
            transform: scale(1.1); z-index: -1;
            transition: 1.5s ease;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 1;
        }

        .container {
            width: 100%; max-width: 440px;
            padding: 50px 20px; display: flex; flex-direction: column;
            gap: 25px; z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px 25px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 120px; height: 120px;
            margin: 0 auto 20px; border-radius: 50%;
            object-fit: cover; border: 1px solid rgba(255,255,255,0.2);
            display: none;
        }

        h1 { font-size: 32px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; margin-bottom: 8px; }
        .bio { font-size: 13px; opacity: 0.5; line-height: 1.6; white-space: pre-wrap; }

        .links { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 24px;
            text-decoration: none; color: #fff;
            font-size: 14px; font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center; /* Центровка текста */
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Иконка слева */
        .btn-icon {
            width: 22px; height: 22px;
            position: absolute;
            left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon img, .btn-icon svg {
            width: 100%; height: 100%;
            object-fit: contain;
            fill: white; /* Для SVG Яндекса */
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02) translateY(-2px);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 50px; }
    </style>
</head>
<body>

<div id="bg"></div>

<div class="container">
    <div class="card">
        <img src="" alt="" class="avatar" id="photo">
        <h1 id="name">BULAVIN</h1>
        <div class="bio" id="bio"></div>
    </div>

    <div id="links-container" class="links"></div>

    <div class="footer">
        © 2026 BULAVIN SYSTEM PRODUCTION
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    // SVG логотип Яндекса (надежный вариант)
    const YANDEX_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 18.545c-3.615 0-6.545-2.93-6.545-6.545S8.385 5.455 12 5.455s6.545 2.93 6.545 6.545-2.93 6.545-6.545 6.545z"/><path d="M12 7.636c-2.41 0-4.364 1.954-4.364 4.364s1.954 4.364 4.364 4.364 4.364-1.954 4.364-4.364-1.954-4.364-4.364-4.364zm0 6.545c-1.205 0-2.182-.977-2.182-2.182s.977-2.182 2.182-2.182 2.182.977 2.182 2.182-.977 2.182-2.182 2.182z"/></svg>`;

    const ICONS = {
        'telegram': 'https://img.icons8.com/ios-filled/50/ffffff/telegram-app.png',
        'instagram': 'https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png',
        'yandex': 'svg', // Метка для вставки SVG
        'spotify': 'https://img.icons8.com/ios-filled/50/ffffff/spotify.png',
        'youtube': 'https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png'
    };

    function parseSafeCSV(text) {
        const result = [];
        let row = [], cell = '', inQuotes = false;
        text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n');
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"' && text[i+1] === '"') { cell += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(cell.trim()); cell = ''; }
            else if (char === '\n' && !inQuotes) { row.push(cell.trim()); result.push(row); row = []; cell = ''; }
            else { cell += char; }
        }
        if (cell || row.length) { row.push(cell.trim()); result.push(row); }
        return result;
    }

    async function init() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = parseSafeCSV(text);
            const headers = rows[0];
            const val = rows[1];

            const getName = (name) => {
                const idx = headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
                return idx !== -1 ? val[idx] : null;
            };

            document.getElementById('name').textContent = getName('псевдоним') || "BULAVIN";
            document.getElementById('bio').textContent = getName('био') || "";
            
            const photo = getName('photo');
            if (photo && photo.startsWith('http')) {
                const img = document.getElementById('photo');
                img.src = photo;
                img.style.display = 'block';
                document.getElementById('bg').style.backgroundImage = `url('${photo}')`;
            }

            const container = document.getElementById('links-container');
            const platforms = [
                {key: 'telegram', label: 'TELEGRAM'},
                {key: 'instagram', label: 'INSTAGRAM'},
                {key: 'yandex', label: 'YANDEX MUSIC'},
                {key: 'spotify', label: 'SPOTIFY'},
                {key: 'youtube', label: 'YOUTUBE'}
            ];

            platforms.forEach(p => {
                const url = getName(p.key);
                if (url && url.startsWith('http')) {
                    const a = document.createElement('a');
                    a.className = 'btn';
                    a.href = url;
                    a.target = '_blank';
                    
                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'btn-icon';
                    
                    if (ICONS[p.key] === 'svg') {
                        iconDiv.innerHTML = YANDEX_SVG;
                    } else {
                        const img = document.createElement('img');
                        img.src = ICONS[p.key];
                        iconDiv.appendChild(img);
                    }
                    
                    const span = document.createElement('span');
                    span.textContent = p.label;
                    
                    a.appendChild(iconDiv);
                    a.appendChild(span);
                    container.appendChild(a);
                }
            });
        } catch (e) { console.error(e); }
    }
    init();
</script>
</body>
</html>
