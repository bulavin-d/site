<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN | Liquid Glass</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shine: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 100%);
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* ГЛУБОКИЙ ФОН */
        .dynamic-bg {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(100px) brightness(0.2) saturate(1.5);
            transform: scale(1.3); z-index: -1;
            transition: background-image 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body::after {
            content: "";
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.07; pointer-events: none; z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1;
            transition: transform 0.1s ease-out;
        }

        /* КАРТОЧКА ПРОФИЛЯ */
        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 35px 25px;
            text-align: center;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: ""; position: absolute; inset: 0;
            background: var(--shine); pointer-events: none;
        }

        .avatar-wrapper {
            width: 130px; height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .profile-card h1 { font-size: 30px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; margin-bottom: 8px; }
        .profile-card p { font-size: 13px; opacity: 0.5; line-height: 1.6; letter-spacing: 0.5px; }

        /* СТЕКЛЯННЫЕ КНОПКИ */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .social-link {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px) brightness(1.1);
            -webkit-backdrop-filter: blur(25px) brightness(1.1);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 22px;
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-logo {
            position: absolute; left: 18px;
            width: 22px; height: 22px;
            fill: #fff; opacity: 0.6;
            transition: 0.3s;
        }

        .social-link span { position: relative; z-index: 2; margin-left: 10px; }

        .social-link:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.02) translateY(-2px);
        }

        .social-link:active { transform: scale(0.96); }

        /* РАЗДЕЛИТЕЛЬ */
        .divider {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            font-size: 9px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .full-width { grid-column: span 2; padding: 22px; background: rgba(255,255,255,0.05); }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 30px; letter-spacing: 2px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .container > * { animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    </style>
</head>
<body>

<div class="dynamic-bg" id="bg"></div>

<div class="container" id="main-container">
    <div class="profile-card">
        <div class="avatar-wrapper">
            <img src="" alt="BULAVIN" class="avatar" id="user-photo">
        </div>
        <h1 id="user-name">...</h1>
        <p id="user-bio"></p>
    </div>

    <div class="grid" id="social-grid"></div>
    <div class="divider">Music Platforms</div>
    <div class="grid" id="music-grid"></div>

    <div class="footer">© <span id="year"></span> BULAVIN SYSTEM</div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ИКОНКИ В КОДЕ (чтобы не было белых квадратов)
    const LOGOS = {
        telegram: `<svg class="btn-logo" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>`,
        instagram: `<svg class="btn-logo" viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 01-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 017.8 2m-.2 2A3.6 3.6 0 004 7.6v8.8A3.6 3.6 0 007.6 20h8.8a3.6 3.6 0 003.6-3.6V7.6A3.6 3.6 0 0016.4 4H7.6m4.4 3a5 5 0 015 5 5 5 0 01-5 5 5 5 0 01-5-5 5 5 0 015-5m0 2a3 3 0 00-3 3 3 3 0 003 3 3 3 0 003-3 3 3 0 00-3-3m5-2.5a1.2 1.2 0 11-1.2 1.2 1.2 1.2 0 011.2-1.2z"/></svg>`,
        yandex: `<svg class="btn-logo" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1.4 15.3l-1.3-3.6-1.8 3.6H5.4l2.8-5.3L5.6 7.4h2.1l1.7 3.5 1.2-3.5h2.1l-2.4 6 2.9 5.9h-2.1z"/></svg>`,
        spotify: `<svg class="btn-logo" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.58 14.45c-.2.32-.61.42-.93.22-2.3-1.41-5.21-1.73-8.63-.95-.36.08-.73-.15-.81-.51-.08-.36.15-.73.51-.81 3.75-.85 6.98-.49 9.56 1.09.32.2.42.61.22.93zm1.22-2.73c-.26.41-.79.54-1.2.28-2.63-1.62-6.65-2.09-9.76-1.15-.46.14-.94-.12-1.08-.58-.14-.46.12-.94.58-1.08 3.55-1.07 8-0.54 11.03 1.32.42.26.55.79.28 1.21zm.11-2.85c-3.16-1.87-8.37-2.05-11.39-1.13-.48.15-1-.12-1.15-.6s.12-1 .6-1.15c3.48-1.06 9.22-0.85 12.89 1.33.43.26.58.82.32 1.25-.26.43-.82.58-1.25.32z"/></svg>`,
        youtube: `<svg class="btn-logo" viewBox="0 0 24 24"><path d="M19.61 7.23c-.22-.84-.88-1.5-1.72-1.72C16.37 5 12 5 12 5s-4.37 0-5.89.51c-.84.22-1.5.88-1.72 1.72C4 8.75 4 12 4 12s0 3.25.39 4.77c.22.84.88 1.5 1.72 1.72C7.63 19 12 19 12 19s4.37 0 5.89-.51c.84-.22 1.5-.88 1.72-1.72.39-1.52.39-4.77.39-4.77s0-3.25-.39-4.77zM10 14.5v-5l4.5 2.5-4.5 2.5z"/></svg>`
    };

    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    function parseCSV(text) {
        const rows = text.split('\r\n');
        return rows.map(row => {
            const result = [];
            let current = '', inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const char = row[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result;
        });
    }

    fetch(CSV_URL)
        .then(res => res.text())
        .then(data => {
            const rows = parseCSV(data);
            const p = rows[1]; 
            if (!p) return;

            document.getElementById('user-name').textContent = p[0].replace(/^"|"$/g, '');
            document.getElementById('user-bio').textContent = p[1].replace(/^"|"$/g, '');
            
            const photo = p[7] ? p[7].replace(/^"|"$/g, '') : '';
            if (photo) {
                document.getElementById('user-photo').src = photo;
                document.getElementById('bg').style.backgroundImage = `url('${photo}')`;
            }

            const socGrid = document.getElementById('social-grid');
            const musGrid = document.getElementById('music-grid');

            const socials = [
                { name: 'Telegram', link: p[2], icon: LOGOS.telegram },
                { name: 'Instagram', link: p[3], icon: LOGOS.instagram }
            ];

            const music = [
                { name: 'Yandex Music', link: p[4], icon: LOGOS.yandex },
                { name: 'Spotify', link: p[5], icon: LOGOS.spotify },
                { name: 'YouTube', link: p[6], icon: LOGOS.youtube }
            ];

            const createBtn = (item, extraClass = '') => {
                let cleanLink = item.link ? item.link.replace(/^"|"$/g, '') : '';
                if (cleanLink.length > 5) {
                    const el = document.createElement('a');
                    el.className = `social-link ${extraClass}`;
                    el.href = cleanLink; el.target = '_blank';
                    el.innerHTML = `${item.icon}<span>${item.name}</span>`;
                    return el;
                }
                return null;
            };

            socials.forEach(s => { const btn = createBtn(s); if(btn) socGrid.appendChild(btn); });
            music.forEach(m => { const btn = createBtn(m, 'full-width'); if(btn) musGrid.appendChild(btn); });
        });

    // ЭФФЕКТ ЖИДКОГО МАГНИТНОГО СТЕКЛА
    const container = document.getElementById('main-container');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 45;
        const y = (window.innerHeight / 2 - e.pageY) / 45;
        container.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
    });

    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const x = (window.innerWidth / 2 - touch.pageX) / 50;
        const y = (window.innerHeight / 2 - touch.pageY) / 50;
        container.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
    });
</script>

</body>
</html>
