<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BULAVIN | Official Website</title>
    <meta property="og:title" content="BULAVIN">
    <meta property="og:description" content="Официальный сайт музыканта. Слушай новые релизы здесь.">
    <meta property="og:image" content="https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --bg-dark: #080808;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* NOISE & DYNAMIC BG */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 10;
        }

        .dynamic-bg {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(100px) brightness(0.2);
            transform: scale(1.3); z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 1;
        }

        /* HEADER */
        .header { text-align: center; margin-bottom: 10px; }
        .avatar {
            width: 110px; height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            margin-bottom: 15px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 32px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
        .header p { font-size: 13px; opacity: 0.5; margin-top: 5px; letter-spacing: 1px; }

        /* ГЛАВНАЯ КНОПКА (ЛИКВИД) */
        .main-release {
            background: #fff;
            color: #000;
            padding: 24px;
            border-radius: 30px;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 40px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .main-release:hover { transform: scale(1.02); box-shadow: 0 15px 50px rgba(255,255,255,0.3); }

        /* СТЕКЛЯННЫЙ РАЗДЕЛИТЕЛЬ */
        .divider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
        }
        .divider-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.3;
        }

        /* СОЦСЕТИ - МЯГКИЕ КНОПКИ */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .social-btn {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 25px;
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: 0.3s;
        }
        .social-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        .footer { text-align: center; margin-top: 40px; font-size: 10px; opacity: 0.2; letter-spacing: 2px; }

        /* АНИМАЦИЯ */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container > * { animation: slideUp 1s ease forwards; }
    </style>
</head>
<body>

<div class="dynamic-bg" id="bg"></div>

<div class="container">
    <div class="header">
        <img src="" alt="BULAVIN" class="avatar" id="avatar">
        <h1 id="name">BULAVIN</h1>
        <p id="bio"></p>
    </div>

    <a href="#" id="main-btn" class="main-release" target="_blank">
        🎧 СЛУШАТЬ НОВЫЙ РЕЛИЗ
    </a>

    <div class="divider-container">
        <div class="divider-line"></div>
        <div class="divider-label">SOCIALS</div>
        <div class="divider-line"></div>
    </div>

    <div class="social-grid" id="social-grid">
        </div>

    <div class="footer">
        © <span id="year"></span> BULAVIN SYSTEM
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZWXN9Zd5Mx5G2ppOxluN6k2IhDObKCxauEtINpQyOsBtxy5dopYqXCEDyGUYXza4XQ_QHauusLxmH/pub?output=csv";

    function parseCSV(text) {
        const rows = text.split('\n');
        return rows.map(row => {
            const cells = [];
            let cell = '';
            let inQuotes = false;
            for (let char of row) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ''; }
                else cell += char;
            }
            cells.push(cell.trim());
            return cells;
        });
    }

    fetch(CSV_URL)
        .then(res => res.text())
        .then(data => {
            const rows = parseCSV(data);
            const p = rows[1]; 
            if(!p) return;

            document.getElementById('name').textContent = p[0];
            document.getElementById('bio').textContent = p[1];
            document.getElementById('avatar').src = p[7];
            document.getElementById('bg').style.backgroundImage = `url('${p[7]}')`;
            document.getElementById('main-btn').href = p[4]; // Яндекс Музыка в топ

            const grid = document.getElementById('social-grid');
            const links = [
                {n: 'Telegram', l: p[2]},
                {n: 'Instagram', l: p[3]},
                {n: 'Spotify', l: p[5]},
                {n: 'YouTube', l: p[6]}
            ];

            links.forEach(link => {
                if(link.l && link.l.length > 5) {
                    const a = document.createElement('a');
                    a.className = 'social-btn';
                    a.href = link.l;
                    a.target = '_blank';
                    a.textContent = link.n;
                    grid.appendChild(a);
                }
            });
        });
</script>

</body>
</html>
