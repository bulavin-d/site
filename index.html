<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN</title>

    <link rel="icon" href="https://em-content.zobj.net/source/apple/354/black-heart_1f5a4.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --verify-blue: #0095f6;
            --yandex-color: #ffcc00;
            --vk-color: #0077ff;
            --spotify-color: #1ed760;
            --yt-color: #ff0000; 
            --sc-color: #ff5500;
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        #global-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            /* Убрали pointer-events: none, чтобы мышка работала */
        }

        .dynamic-bg {
            position: fixed; inset: 0;
            background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center;
            background-size: cover;
            filter: blur(80px) brightness(0.2);
            transform: scale(1.1); z-index: -2;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 5;
            pointer-events: auto; /* Чтобы кнопки работали */
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 10px;
        }

        .avatar-link {
            display: block;
            width: 110px; height: 110px;
            margin: 0 auto 20px;
            text-decoration: none;
            position: relative;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--insta-gradient);
            border-radius: 50%;
            animation: rotate-gradient 4s linear infinite;
            z-index: -2;
        }

        .avatar-link::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: var(--insta-gradient);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.5;
            z-index: -3;
        }

        .avatar-inner-border {
            position: absolute;
            inset: 4px;
            background: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
        }

        .avatar { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            display: block;
        }

        @keyframes rotate-gradient {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-link:hover { transform: scale(1.08); }

        .name-wrapper {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-bottom: 8px;
        }

        h1 { font-size: 24px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
        .verify-icon { width: 18px; height: 18px; fill: var(--verify-blue); }
        .bio { font-size: 12px; opacity: 0.6; text-align: center; line-height: 1.4; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        .btn {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 18px 20px;
            border-radius: 20px;
            text-decoration: none; color: #fff;
            font-size: 13px; font-weight: 600;
            display: flex; 
            align-items: center; 
            justify-content: flex-start;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .btn i { font-size: 18px; width: 25px; margin-right: 15px; display: flex; justify-content: center; }
        .btn span { flex-grow: 1; text-align: center; margin-right: 25px; }
        .btn:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }

        .music-collapse-wrapper {
            display: grid; grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .music-collapse-wrapper.show { grid-template-rows: 1fr; }
        .music-list { min-height: 0; display: flex; flex-direction: column; gap: 10px; }
        .music-list .btn:first-child { margin-top: 10px; }

        .btn-yandex:hover { color: var(--yandex-color); box-shadow: inset 0 0 20px rgba(255, 204, 0, 0.15); }
        .btn-vk:hover { color: var(--vk-color); box-shadow: inset 0 0 20px rgba(0, 119, 255, 0.15); }
        .btn-spotify:hover { color: var(--spotify-color); box-shadow: inset 0 0 20px rgba(30, 215, 96, 0.15); }
        .btn-apple:hover { 
            color: #fff; 
            background: rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 0 15px rgba(255, 255, 255, 0.05); 
            border-color: rgba(255, 255, 255, 0.4);
        }
        .btn-yt:hover { color: #ff4d4d; box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.2); }
        .btn-soundcloud:hover { color: var(--sc-color); box-shadow: inset 0 0 20px rgba(255, 85, 0, 0.15); }

        .full { grid-column: span 2; }

        .prediction-wrapper { position: relative; width: 100%; margin-top: 15px; }
        .prediction-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 25px;
            backdrop-filter: blur(20px);
            text-align: center;
            position: relative; z-index: 2;
        }

        .prediction-header {
            font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 15px; color: var(--verify-blue); font-weight: 800; opacity: 0.8;
        }
        .prediction-text { font-size: 15px; line-height: 1.6; font-weight: 400; color: #fff; }

        #magic-canvas {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120%; height: 150%; z-index: 1; pointer-events: none;
        }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 30px; letter-spacing: 2px; }
    </style>
</head>
<body>

<canvas id="global-canvas"></canvas>
<div class="dynamic-bg"></div>

<div class="container">
    <div class="profile-card">
        <a href="https://www.instagram.com/lu4danya" target="_blank" class="avatar-link">
            <div class="avatar-inner-border">
                <img src="https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000" alt="BULAVIN" class="avatar">
            </div>
        </a>
        <div class="name-wrapper">
            <h1>BULAVIN</h1>
            <svg class="verify-icon" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6c.154-.435.238-.905.238-1.4c0-2.21-1.71-3.998-3.818-3.998c-.47 0-.92.084-1.336.25C14.818 2.415 13.51 1.5 12 1.5s-2.816.917-3.437 2.25c-.415-.165-.866-.25-1.336-.25c-2.11 0-3.818 1.79-3.818 4c0 .494.083.964.237 1.4c-1.272.65-2.147 2.02-2.147 3.6c0 1.58.875 2.95 2.147 3.6c-.154.435-.237.905-.237 1.4c0 2.21 1.71 4 3.818 4c.47 0 .92-.084 1.335-.25c.62 1.334 1.926 2.25 3.437 2.25s2.817-.916 3.437-2.25c.415.165.865.25 1.336.25c2.11 0 3.818-1.79 3.818-4c0-.495-.084-.965-.238-1.4c1.273-.65 2.148-2.02 2.148-3.6zm-12.42 5.393l-4.104-4.103l1.591-1.592l2.513 2.513l6.45-6.45l1.59 1.592l-8.04 8.04z"/></svg>
        </div>
        <p class="bio">Казахстанский исполнитель и музыкальный продюсер.</p>
    </div>

    <div class="grid">
        <a href="https://t.me/imbulavin" target="_blank" class="btn">
            <i class="fa-brands fa-telegram"></i><span>Telegram</span>
        </a>
        <a href="https://www.instagram.com/lu4danya" target="_blank" class="btn">
            <i class="fa-brands fa-instagram"></i><span>Instagram</span>
        </a>
    </div>

    <div class="btn full music-trigger" id="music-btn">
        <div class="btn-content" style="position: relative; z-index: 2; width: 100%; display: flex; align-items: center;">
            <i class="fa-solid fa-headphones"></i>
            <span>СЛУШАТЬ МУЗЫКУ</span>
        </div>
    </div>

    <div class="music-collapse-wrapper" id="music-wrapper">
        <div class="music-list">
            <a href="https://music.yandex.kz/artist/24009925" target="_blank" class="btn full btn-yandex">
                <i class="fa-solid fa-compact-disc"></i><span>Yandex Music</span>
            </a>
            <a href="https://vk.com/artist/bulavin" target="_blank" class="btn full btn-vk">
                <i class="fa-brands fa-vk"></i><span>VK Music</span>
            </a>
            <a href="https://open.spotify.com/artist/7Efya7yCpL4M7BPdcm6qUq" target="_blank" class="btn full btn-spotify">
                <i class="fa-brands fa-spotify"></i><span>Spotify</span>
            </a>
            <a href="https://music.apple.com/ru/artist/bulavin/1805904899" target="_blank" class="btn full btn-apple">
                <i class="fa-brands fa-apple"></i><span>Apple Music</span>
            </a>
            <a href="https://music.youtube.com/channel/UCRyTj6rCcgg385Rg58zo_PA" target="_blank" class="btn full btn-yt">
                <i class="fa-brands fa-youtube"></i><span>YouTube Music</span>
            </a>
            <a href="https://soundcloud.com/bulavin" target="_blank" class="btn full btn-soundcloud">
                <i class="fa-brands fa-soundcloud"></i><span>SoundCloud</span>
            </a>
        </div>
    </div>

    <div class="prediction-wrapper">
        <canvas id="magic-canvas"></canvas>
        <div class="prediction-card">
            <div class="prediction-header">BULAVIN SYSTEM • БАЗА ДНЯ</div>
            <div id="prediction" class="prediction-text">Подключаюсь...</div>
        </div>
    </div>

    <div class="footer">© 2026 BULAVIN</div>
</div>

<script>
    // Раскрытие списка музыки
    const musicBtn = document.getElementById('music-btn');
    const musicWrapper = document.getElementById('music-wrapper');
    musicBtn.addEventListener('click', () => { musicWrapper.classList.toggle('show'); });

    // --- ИНТЕРАКТИВНЫЙ ФОН (ЧАСТИЦЫ + МЫШКА + ПОЛОСКИ) ---
    const globalCanvas = document.getElementById('global-canvas');
    const gCtx = globalCanvas.getContext('2d');
    let gParticles = [];
    const mouse = { x: null, y: null, radius: 150 };

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.x;
        mouse.y = e.y;
    });

    function initGlobalCanvas() {
        globalCanvas.width = window.innerWidth;
        globalCanvas.height = window.innerHeight;
        gParticles = [];
        let count = (globalCanvas.width * globalCanvas.height) / 9000;
        for (let i = 0; i < Math.min(count, 120); i++) { gParticles.push(new GlobalParticle()); }
    }

    class GlobalParticle {
        constructor() {
            this.x = Math.random() * globalCanvas.width;
            this.y = Math.random() * globalCanvas.height;
            this.size = Math.random() * 2 + 1;
            this.baseX = this.x;
            this.baseY = this.y;
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = (Math.random() - 0.5) * 0.8;
            this.density = (Math.random() * 30) + 1;
        }
        update() {
            // Движение по холсту
            this.x += this.vx;
            this.y += this.vy;

            // Отскок от краев
            if (this.x < 0 || this.x > globalCanvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > globalCanvas.height) this.vy *= -1;

            // Взаимодействие с мышкой
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let forceDirectionX = dx / distance;
            let forceDirectionY = dy / distance;
            let maxDistance = mouse.radius;
            let force = (maxDistance - distance) / maxDistance;
            let directionX = forceDirectionX * force * this.density;
            let directionY = forceDirectionY * force * this.density;

            if (distance < mouse.radius) {
                this.x -= directionX;
                this.y -= directionY;
            }
        }
        draw() {
            gCtx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            gCtx.beginPath(); gCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); gCtx.fill();
        }
    }

    function connect() {
        for (let a = 0; a < gParticles.length; a++) {
            for (let b = a; b < gParticles.length; b++) {
                let dx = gParticles[a].x - gParticles[b].x;
                let dy = gParticles[a].y - gParticles[b].y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 150) {
                    let opacity = 1 - (distance / 150);
                    gCtx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.2})`;
                    gCtx.lineWidth = 1;
                    gCtx.beginPath();
                    gCtx.moveTo(gParticles[a].x, gParticles[a].y);
                    gCtx.lineTo(gParticles[b].x, gParticles[b].y);
                    gCtx.stroke();
                }
            }
        }
    }

    function animateGlobal() {
        gCtx.clearRect(0, 0, globalCanvas.width, globalCanvas.height);
        for (let i = 0; i < gParticles.length; i++) {
            gParticles[i].update();
            gParticles[i].draw();
        }
        connect();
        requestAnimationFrame(animateGlobal);
    }

    window.addEventListener('resize', initGlobalCanvas);
    initGlobalCanvas(); 
    animateGlobal();

    // Предсказания
    async function fetchPrediction() {
        const textEl = document.getElementById('prediction');
        try {
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://fucking-great-advice.ru/api/random'));
            const data = await response.json();
            const advice = JSON.parse(data.contents);
            textEl.innerText = advice.text;
        } catch (e) { textEl.innerText = "Делай то, что любишь. Остальное подтянется."; }
    }
    fetchPrediction();

    // Магия под советом (синие искры)
    const mCanvas = document.getElementById('magic-canvas');
    const mCtx = mCanvas.getContext('2d');
    let mParticles = [];
    function initMCanvas() { mCanvas.width = mCanvas.offsetWidth; mCanvas.height = mCanvas.offsetHeight; }
    class MParticle {
        constructor() {
            this.x = Math.random() * mCanvas.width;
            this.y = Math.random() * mCanvas.height;
            this.size = Math.random() * 2;
            this.sx = Math.random() * 0.4 - 0.2;
            this.sy = Math.random() * 0.4 - 0.2;
        }
        update() {
            this.x += this.sx; this.y += this.sy;
            if (this.x < 0 || this.x > mCanvas.width) this.sx *= -1;
            if (this.y < 0 || this.y > mCanvas.height) this.sy *= -1;
        }
        draw() {
            mCtx.fillStyle = 'rgba(0, 149, 246, 0.3)';
            mCtx.beginPath(); mCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); mCtx.fill();
        }
    }
    function animateM() {
        mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
        mParticles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateM);
    }
    window.addEventListener('resize', initMCanvas);
    initMCanvas();
    for(let i=0; i<30; i++) mParticles.push(new MParticle());
    animateM();
</script>

</body>
</html>
