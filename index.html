    <style>

        body { background: #000; color: #fff; min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        .avatar-link::before { content: ''; position: absolute; inset: 0; background: var(--insta-gradient); border-radius: 50%; animation: rotate-gradient 4s linear infinite; z-index: -1; }
        @keyframes rotate-gradient { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-size: 24px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }

        .btn { position: relative; background: var(--glass); border: 1px solid var(--glass-border); padding: 18px 20px; border-radius: 20px; text-decoration: none; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; transition: 0.4s ease; cursor: pointer; }
        .btn i { font-size: 18px; width: 25px; margin-right: 15px; }
        .btn span { flex-grow: 1; text-align: center; margin-right: 25px; }

        .auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .auth-modal.show { display: flex; }

        .auth-form input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 12px; outline: none; font-size: 13px; }
        .btn-action { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; font-weight: 800; font-size: 12px; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }

        .dynamic-bg { position: fixed; inset: 0; background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center; background-size: cover; filter: blur(80px) brightness(0.2); z-index: -2; }

<body>

<canvas id="global-canvas"></canvas>
<div class="dynamic-bg"></div>

<div class="container">
    <div class="auth-nav">
        <button class="btn-auth" onclick="openAuth(true)">Вход</button>
        <button class="btn-auth" onclick="openAuth(false)">Регистрация</button>
    </div>

    <div class="profile-card">
        <div class="avatar-link">
            <div class="avatar-inner-border"><img src="https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000" class="avatar"></div>
        </div>
        <h1>BULAVIN</h1>
        <p class="bio">Казахстанский исполнитель и музыкальный продюсер.</p>
    </div>

    <a href="https://t.me/imbulavin" target="_blank" class="btn"><i class="fa-brands fa-telegram"></i><span>Telegram</span></a>
    <a href="https://www.instagram.com/lu4danya" target="_blank" class="btn"><i class="fa-brands fa-instagram"></i><span>Instagram</span></a>
    <div class="btn" onclick="alert('Скоро!')"><i class="fa-solid fa-headphones"></i><span>СЛУШАТЬ МУЗЫКУ</span></div>

    <div class="footer" style="text-align: center; margin-top: 20px; opacity: 0.3; font-size: 10px;">© 2026 BULAVIN</div>
</div>

<div class="auth-modal" id="authModal" onclick="if(event.target === this) closeAuth()">
    <div class="auth-form" id="authForm" onclick="event.stopPropagation()">
        <h2 id="authTitle">ВХОД</h2>
        <div id="authInputs" style="width: 100%;">
            <input type="text" id="authUsername" placeholder="USER @USERNAME" style="display: none;">
            <input type="email" id="authEmail" placeholder="EMAIL">
            <input type="password" id="authPassword" placeholder="ПАРОЛЬ">
            <button class="btn-action" id="authBtn" onclick="executeAuth()">ВОЙТИ</button>
        </div>
        <div id="authSuccess" style="display: none; text-align: center; width: 100%;">
            <i class="fa-regular fa-envelope" style="font-size: 40px; color: var(--verify-blue); margin-bottom: 20px;"></i>
            <p id="successText" style="font-size: 11px; opacity: 0.9;">Готово! Можно входить.</p>
            <button class="btn-action" style="margin-top: 20px;" onclick="closeAuth()">ПОНЯТНО</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = true;

    function openAuth(l) { 
        isLoginMode = l; 
        document.getElementById('authTitle').innerText = l ? 'ВХОД' : 'РЕГИСТРАЦИЯ'; 
        document.getElementById('authBtn').innerText = l ? 'ВОЙТИ' : 'ЗАРЕГИСТРИРОВАТЬСЯ';
        
        // Показываем поле Username ТОЛЬКО при регистрации
        document.getElementById('authUsername').style.display = l ? 'none' : 'block';
        
        document.getElementById('authInputs').style.display = 'block';
        document.getElementById('authSuccess').style.display = 'none';
        document.getElementById('authModal').classList.add('show'); 
    }

    function closeAuth() { document.getElementById('authModal').classList.remove('show'); }

    async function executeAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const username = document.getElementById('authUsername').value;
        const btn = document.getElementById('authBtn');

        if(!email || !password) return alert('Заполни поля!');
        if(!isLoginMode && !username) return alert('Придумай юзернейм!');

        btn.disabled = true; btn.innerText = 'ПОДОЖДИ...';
        
        if (isLoginMode) {
            // ВХОД
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) { alert(error.message); btn.disabled = false; btn.innerText = 'ВОЙТИ'; }
            else window.location.href = 'dashboard/'; 
        } else {
            // РЕГИСТРАЦИЯ + Сохранение Username в Metadata
            const { error } = await _supabase.auth.signUp({ 
                email, 
                password,
                options: {
                    data: {
                        username: username // Вот это улетит в базу!
                    }
                }
            });

            if (error) { alert(error.message); btn.disabled = false; btn.innerText = 'ЗАРЕГИСТРИРОВАТЬСЯ'; }
            else {
                document.getElementById('authInputs').style.display = 'none';
                document.getElementById('authSuccess').style.display = 'block';
                document.getElementById('successText').innerText = 'Проверь почту или просто попробуй войти!';
            }
        }
    }

    // Анимация фона (черные сердца)
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let emojis = [];
    class FloatingEmoji {
        constructor() { this.init(true); }
        init(f) {
            this.x = Math.random() * window.innerWidth;
            this.y = f ? Math.random() * window.innerHeight : -50;
            this.emoji = '🖤';
            this.size = Math.random() * 20 + 20;
            this.vy = Math.random() * 0.5 + 0.2;
            this.op = Math.random() * 0.2 + 0.1;
        }
        update() { this.y += this.vy; if (this.y > window.innerHeight + 50) this.init(false); }
        draw() { ctx.globalAlpha = this.op; ctx.font = `${this.size}px serif`; ctx.fillText(this.emoji, this.x, this.y); }
    }
    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        emojis = Array.from({length: 15}, () => new FloatingEmoji());
    }
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); emojis.forEach(e => { e.update(); e.draw(); }); requestAnimationFrame(anim); }
    window.addEventListener('resize', initCanvas); initCanvas(); anim();
</script>
</body>
