    let isLoginMode = true;

    function openAuth(isLogin) {
        isLoginMode = isLogin;
        document.getElementById('authTitle').innerText = isLogin ? 'LOGIN' : 'REGISTER';
        document.getElementById('authModal').classList.add('show');
    }

    function closeAuth() {
        document.getElementById('authModal').classList.remove('show');

    async function executeAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const btn = document.getElementById('mainAuthBtn');
        
        if(!email || !password) return alert('Заполни поля!');
        
        btn.disabled = true;
        btn.innerText = 'WAIT...';

        if (isLoginMode) {
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else window.location.href = 'dashboard.html'; 
        } else {
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert('Успешно! Теперь нажмите LOGIN и войдите.');
        }
        btn.disabled = false;
        btn.innerText = 'ПОДТВЕРДИТЬ';
    }

    // Твои функции сворачивания
    function setupCollapse(btnId, wrapperId) {
        const btn = document.getElementById(btnId);
        const wrapper = document.getElementById(wrapperId);
        if(btn) btn.onclick = () => wrapper.classList.toggle('show');
    }

            document.getElementById('prediction').innerText = JSON.parse(d.contents).text;
        } catch(e) { document.getElementById('prediction').innerText = "Живи моментом."; }
    }
    fetchPrediction();
