<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN ADMIN | SYSTEM CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .admin-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box; }
        input[type="file"] { display: none; }
        .upload-label, .login-btn { display: block; background: #fff; color: #000; padding: 18px; border-radius: 15px; font-weight: 900; letter-spacing: 2px; cursor: pointer; margin-top: 10px; border: none; width: 100%; transition: 0.2s; }
        .upload-label:hover, .login-btn:hover { transform: scale(1.02); background: #eee; }
        #status { font-size: 11px; opacity: 0.5; margin-top: 15px; text-transform: uppercase; }
        .back-btn { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; font-size: 10px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1 id="title" style="font-size: 18px; margin-bottom: 30px; letter-spacing: 3px;">SYSTEM ACCESS</h1>
        
        <div id="loginForm">
            <input type="password" id="passInput" placeholder="ENTER ADMIN PASSWORD">
            <button class="login-btn" onclick="handleLogin()">AUTHORIZE</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <label for="fileInput" class="upload-label">ВЫБРАТЬ ВИДЕО</label>
            <input type="file" id="fileInput" accept="video/mp4,video/quicktime" onchange="uploadFile()">
            <button onclick="handleLogout()" style="background:none; border:none; color:red; font-size:10px; cursor:pointer; margin-top:10px;">LOGOUT</button>
        </div>

        <p id="status">IDLE</p>
        <a href="/" class="back-btn">RETURN TO MAIN</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'bulavka.music@mail.ru';

        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session && session.user.email === ADMIN_EMAIL) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('title').innerText = 'UPLOAD STORY';
                document.getElementById('status').innerText = 'READY TO SYNC';
            }
        }
        checkAuth();

        async function handleLogin() {
            const password = document.getElementById('passInput').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: ADMIN_EMAIL, password });
            if (error) alert('ACCESS DENIED: ' + error.message);
            else checkAuth();
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            location.reload();
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            if (!file) return;

            status.innerText = 'SYNCING...';
            const { error } = await _supabase.storage
                .from('stories')
                .upload('story.mp4', file, { upsert: true, cacheControl: '0' });

            if (error) status.innerText = 'ERROR: ' + error.message;
            else {
                status.innerText = 'SYNC COMPLETE';
                alert('Кружок успешно обновлен!');
            }
        }
    </script>
</body>
</html>
