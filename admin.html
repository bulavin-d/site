<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULAVIN ADMIN | SYSTEM CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        input[type="file"] { display: none; }
        .upload-label { display: block; background: #fff; color: #000; padding: 20px; border-radius: 15px; font-weight: 900; letter-spacing: 2px; cursor: pointer; margin-bottom: 20px; transition: transform 0.2s; }
        .upload-label:hover { transform: scale(1.05); }
        .upload-label:active { transform: scale(0.95); }
        #status { font-size: 11px; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; }
        .back-btn { display: inline-block; margin-top: 20px; color: #ff4b2b; text-decoration: none; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="admin-card" id="adminPanel" style="display:none;">
        <h1 style="font-size: 18px; margin-bottom: 30px; letter-spacing: 3px;">UPLOAD STORY</h1>
        <label for="fileInput" class="upload-label">ВЫБРАТЬ ВИДЕО</label>
        <input type="file" id="fileInput" accept="video/mp4,video/quicktime" onchange="uploadFile()">
        <p id="status">Ожидание файла...</p>
        <a href="/" class="back-btn">НА ГЛАВНУЮ</a>
    </div>

    <script>
        // Твои ключи из основного сайта (они публичные, всё безопасно)
        const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Почта босса
        const ADMIN_EMAIL = 'bulavka.music@mail.ru';

        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (session && session.user.email === ADMIN_EMAIL) {
                // Если почта совпадает — пускаем
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                // Если нет — выкидываем на главную
                alert('ДОСТУП ЗАПРЕЩЕН. Зайди на главную и авторизуйся как ' + ADMIN_EMAIL);
                window.location.href = '/';
            }
        }
        checkAuth();

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            if (!file) return;

            status.innerText = 'ЗАГРУЗКА В СИСТЕМУ... (ПОДОЖДИ)';

            // Загружаем файл в ведро stories и называем его story.mp4
            const { data, error } = await _supabase.storage
                .from('stories')
                .upload('story.mp4', file, { upsert: true, cacheControl: '0' }); // upsert:true означает "перезаписать старое"

            if (error) {
                status.innerText = 'ОШИБКА: ' + error.message;
            } else {
                status.innerText = 'ГОТОВО! ВИДЕО ОБНОВЛЕНО.';
                alert('Сюда! Кружок успешно загружен в систему.');
            }
        }
    </script>
</body>
</html>
