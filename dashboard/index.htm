<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | BULAVIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .dynamic-bg { 
            position: fixed; 
            inset: 0; 
            background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center; 
            background-size: cover; 
            filter: blur(80px) brightness(0.2); 
            z-index: -1; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 40px; 
            border-radius: 40px; 
            text-align: center; 
            border-left: 2px solid #0095f6;
            max-width: 300px;
            width: 90%;
        }
        h1 { font-size: 18px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
        p { font-size: 14px; opacity: 0.7; line-height: 1.6; }
        b { color: #0095f6; }
        button { 
            background: #fff; 
            border: none; 
            color: #000; 
            padding: 14px 28px; 
            border-radius: 15px; 
            cursor: pointer; 
            margin-top: 30px; 
            font-weight: 900; 
            font-size: 12px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="dynamic-bg"></div>
    <div class="glass">
        <h1>ДОСТУП ОТКРЫТ</h1>
        <p>Привет, артист!<br>Ты зашел под почтой:<br><b id="user-mail">загрузка...</b></p>
        <button onclick="logout()">ВЫЙТИ ИЗ СИСТЕМЫ</button>
    </div>

    <script>
        // Твои данные Supabase
        const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Проверка: залогинен ли юзер?
        async function checkUser() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                // Если не залогинен — кидаем на главную
                window.location.href = '/'; 
            } else {
                document.getElementById('user-mail').innerText = session.user.email;
            }
        }

        // Выход
        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = '/';
        }

        checkUser();
    </script>
</body>
</html>
