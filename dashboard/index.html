<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BULAVIN | INNER CIRCLE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="https://em-content.zobj.net/source/apple/354/black-heart_1f5a4.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --red-accent: #ff4b2b;
        }

        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            overflow: hidden; overscroll-behavior: none;
            background: #050505; color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body { display: flex; justify-content: center; align-items: center; }
        * { box-sizing: border-box; }
        
        #global-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .dynamic-bg { position: fixed; inset: 0; background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center; background-size: cover; filter: blur(70px) brightness(0.25); transform: scale(1.1); z-index: -2; }
        
        .container { width: 100%; max-width: 420px; padding: 20px; display: flex; flex-direction: column; z-index: 5; position: relative; opacity: 0; animation: fadeIn 2s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .dashboard-card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            padding: 50px 25px 45px; 
            border-radius: 40px; 
            text-align: center; 
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        .logout-btn {
            position: absolute; top: 20px; right: 20px;
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.5); 
            border-radius: 12px; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s ease;
        }
        .logout-btn i { font-size: 15px; margin-left: 2px; }
        .logout-btn:hover { 
            color: var(--red-accent); border-color: rgba(255, 75, 43, 0.4);
            background: rgba(255, 75, 43, 0.1); box-shadow: 0 0 15px rgba(255, 75, 43, 0.3);
            transform: scale(1.05);
        }

        /* Уменьшили отступ под юзернеймом */
        h1 { font-size: 20px; letter-spacing: 4px; font-weight: 900; margin-bottom: 20px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .soul-text {
            font-size: 14px; font-weight: 300; line-height: 1.6; opacity: 0.85; 
            margin-bottom: 35px; letter-spacing: 0.5px;
            width: 100%; max-width: 340px;
        }
        .soul-text p { margin-bottom: 12px; } /* Уменьшили отступ между строками */
        .soul-text p:last-child { margin-bottom: 0; }
        
        .soul-text .highlight {
            margin-top: 20px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
        }
        .soul-text span { 
            display: block; margin-top: 8px; font-size: 16px;
            color: #fff; font-weight: 800; opacity: 1; 
            text-shadow: 0 0 20px rgba(255,255,255,0.6); 
            letter-spacing: 2px; text-transform: uppercase;
        }

        .merge-btn { 
            position: relative; width: 100%; padding: 20px; border-radius: 20px; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; font-weight: 900; font-size: 13px; letter-spacing: 6px; cursor: pointer; 
            transition: all 0.5s ease; text-transform: uppercase; text-decoration: none;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            animation: heartbeat 3s infinite;
        }
        @keyframes heartbeat { 
            0% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.4); border-color: rgba(255, 255, 255, 0.6); }
            100% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        }
        .merge-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .merge-btn:active { transform: scale(0.96); }
        .merge-btn i { font-size: 20px; opacity: 0.9; }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

<canvas id="global-canvas"></canvas>
<div class="dynamic-bg"></div>

<div class="container" id="dashboardContent" style="display: none;">
    <div class="dashboard-card">
        <button class="logout-btn" onclick="logOut()">
            <i class="fa-solid fa-door-open"></i>
        </button>
        
        <h1 id="userNameDisplay">@USER</h1>

        <div class="soul-text">
            <p>В каждом моём треке — есть кусочек моей души.</p>
            <p>Я уже часть тебя.<br>А ты — почти часть меня.</p>
            <p class="highlight">Нам не хватает только одного...<span>Полного слияния.</span></p>
        </div>

        <a href="https://t.me/imbulavin_bot" target="_blank" class="merge-btn">
            <i class="fa-solid fa-fingerprint"></i>
            СЛИЯНИЕ
        </a>
    </div>
    <div class="footer">© 2026 BULAVIN SYSTEM</div>
</div>

<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = '../'; } 
        else {
            document.getElementById('dashboardContent').style.display = 'flex';
            let username = user.user_metadata?.username;
            if (!username) username = '@' + user.email.split('@')[0];
            document.getElementById('userNameDisplay').innerText = username.toUpperCase();
        }
    }

    async function logOut() {
        await _supabase.auth.signOut();
        window.location.href = '../';
    }
    checkUser();

    // --- БРОНЕБОЙНАЯ СИСТЕМА ДУШ НА ТЕНЯХ ---
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let souls = [];

    class Soul {
        constructor(type) {
            this.type = type; // 'white' или 'red'
            this.init(true);
        }
        
        init(isStart) {
            this.x = Math.random() * window.innerWidth;
            this.y = isStart ? Math.random() * window.innerHeight : window.innerHeight + 50;
            this.vx = (Math.random() - 0.5) * 0.6;
            this.vy = -(Math.random() * 0.5 + 0.3); // Плывут вверх
            this.size = Math.random() * 12 + 8;
            this.alpha = Math.random() * 0.4 + 0.2;
            
            this.partner = null;
            this.isMerging = false;
            this.flash = 0;
        }

        update(allSouls) {
            // Если взрываемся
            if (this.flash > 0) {
                this.flash -= 0.03;
                this.size += 1.5;
                if (this.flash <= 0) this.init(false);
                return;
            }

            // Обычный полет и поиск пары
            if (!this.partner) {
                this.x += this.vx;
                this.y += this.vy;
                
                // Улетели за экран — перерождаемся снизу
                if (this.y < -50 || this.x < -50 || this.x > width + 50) this.init(false);

                // Белые ищут красных
                if (this.type === 'white') {
                    for (let other of allSouls) {
                        if (other.type === 'red' && !other.partner && !other.isMerging && other.flash <= 0) {
                            let dx = other.x - this.x;
                            let dy = other.y - this.y;
                            if (dx*dx + dy*dy < 20000) { // Ищут в широком радиусе
                                this.partner = other;
                                other.partner = this;
                                this.isMerging = true;
                                other.isMerging = true;
                                break;
                            }
                        }
                    }
                }
            } else {
                // Притягивание друг к другу
                let dx = this.partner.x - this.x;
                let dy = this.partner.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                this.x += dx * 0.04;
                this.y += dy * 0.04;

                // Касание
                if (dist < 10 && this.type === 'white') {
                    this.flash = 1; // Запуск взрыва
                    this.partner.init(false); // Красная исчезает
                    this.partner = null;
                }
            }
        }

        draw(ctx) {
            if (this.alpha <= 0 || this.size <= 0) return;
            
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            
            if (this.flash > 0) {
                ctx.fillStyle = `rgba(255, 150, 150, ${this.flash})`;
                ctx.shadowBlur = 30;
                ctx.shadowColor = `rgba(255, 75, 43, ${this.flash})`;
            } else {
                let r = this.type === 'white' ? 255 : 255;
                let g = this.type === 'white' ? 255 : 75;
                let b = this.type === 'white' ? 255 : 43;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.alpha})`;
                ctx.shadowBlur = 25;
                ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${this.alpha * 1.5})`;
            }
            
            ctx.fill();
            ctx.shadowBlur = 0; // Обязательно сбрасываем, чтобы не сломать остальной канвас
        }
    }

    function initCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        souls = [];
        // Создаем 15 пар душ
        for(let i=0; i<15; i++) {
            souls.push(new Soul('white'));
            souls.push(new Soul('red'));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        souls.forEach(s => { 
            s.update(souls); 
            s.draw(ctx); 
        });
        requestAnimationFrame(animate);
    }
    
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(initCanvas, 200);
    });

    initCanvas();
    animate();
</script>
</body>
</html>
