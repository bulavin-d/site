<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyWjPndo7PxgFsZRXK7SmqS9K3pHPD2A4OjuBrDoz7kmG82XOeZc_2zrlx7083yOEEMIw/exec';

    let currentUsername = "@Unknown";

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = '../'; } 
        else {
            document.getElementById('dashboardContent').style.display = 'flex';
            currentUsername = user.user_metadata?.username || ('@' + user.email.split('@')[0]);
            document.getElementById('userNameDisplay').innerText = currentUsername.toUpperCase();
        }
    }

    async function logOut() {
        await _supabase.auth.signOut();
        window.location.href = '../';
    }
    checkUser();

    function openAnon() { document.getElementById('anonModal').classList.add('show'); }
    function closeAnon() { document.getElementById('anonModal').classList.remove('show'); }

    const form = document.getElementById('anonForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('anonMessage').value;

        btn.disabled = true;
        btn.innerText = 'СВЯЗЬ...';

        const formData = new FormData();
        formData.append('message', msg);
        formData.append('username', currentUsername);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => {
                btn.innerText = 'ГОТОВО';
                form.reset();
                setTimeout(() => { closeAnon(); btn.disabled = false; btn.innerText = 'ОТПРАВИТЬ'; }, 1500);
            })
            .catch(error => {
                alert('Ошибка системы');
                btn.disabled = false;
                btn.innerText = 'ОТПРАВИТЬ';
            });
    });

    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let questions = [];
    let lastWidth = window.innerWidth;

    class FloatingQuestion {
        constructor() { this.init(true); }
        init(f) {
            this.x = Math.random() * window.innerWidth;
            this.y = f ? Math.random() * window.innerHeight : window.innerHeight + 50;
            this.size = Math.random() * 20 + 15;
            this.speed = Math.random() * 0.4 + 0.1;
            this.op = Math.random() * 0.15 + 0.05;
            this.wobble = Math.random() * Math.PI * 2;
            this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        }
        update() { 
            this.y -= this.speed; 
            this.x += Math.sin(this.wobble) * 0.5;
            this.wobble += this.wobbleSpeed;
            if (this.y < -50) this.init(false); 
        }
        draw() { 
            ctx.save(); 
            ctx.globalAlpha = this.op; 
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${this.size}px 'Inter', sans-serif`; 
            ctx.textAlign = 'center'; 
            ctx.fillText('?', this.x, this.y); 
            ctx.restore(); 
        }
    }
    
    function initCanvas() {
        const isWidthChanged = Math.abs(lastWidth - window.innerWidth) > 50;
        if(isWidthChanged || questions.length === 0) {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            lastWidth = window.innerWidth;
            questions = Array.from({length: 25}, () => new FloatingQuestion());
        } else {
            canvas.height = window.innerHeight;
        }
    }
    
    function anim() { 
        ctx.clearRect(0,0,canvas.width,canvas.height); 
        questions.forEach(q => { q.update(); q.draw(); }); 
        requestAnimationFrame(anim); 
    }
    window.addEventListener('resize', initCanvas);
    initCanvas(); anim();
</script>
