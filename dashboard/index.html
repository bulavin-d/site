        .main-card {

            text-transform: uppercase;
        }

        @keyframes glow-pulse {
            from { opacity: 0.6; text-shadow: 0 0 10px rgba(255, 75, 43, 0.4); }
            to { opacity: 1; text-shadow: 0 0 30px rgba(255, 75, 43, 0.8); }
        }

        /* Лоадер */
        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top: 2px solid var(--red-glow);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Кнопка */

            margin-top: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 18px 35px;

<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Фикс багов с переходом
    async function checkUser() {
        const { data: { session }, error } = await _supabase.auth.getSession();
        if (error || !session) {
            window.location.replace('index.html'); // Используем replace вместо href
        }
    }
    checkUser();

    // Чистый логаут без зависаний
    async function logout() {
        try {
            await _supabase.auth.signOut();
            window.location.replace('index.html');
        } catch (e) {
            // Если даже тут баганет, просто кидаем на главную
            window.location.replace('index.html');
        }
    }

    /* --- ТА ЖЕ АНИМАЦИЯ ФОНА ЧТО И НА ГЛАВНОЙ --- */
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let emojis = [];
    class FloatingEmoji {
        constructor() { this.init(true); }
        init(f) {
            this.x = Math.random() * window.innerWidth;
            this.y = f ? Math.random() * window.innerHeight : -50;
            this.emoji = ['🖤', '💼', '🎧'][Math.floor(Math.random() * 3)];
            this.size = Math.random() * 20 + 20;
            this.vx = (Math.random() - 0.5) * 0.4;
            this.vy = (Math.random() - 0.5) * 0.4;
            this.rot = Math.random() * Math.PI * 2;
            this.rotSpd = (Math.random() - 0.5) * 0.01;
            this.op = Math.random() * 0.2 + 0.1;
        }
        update() { 
            this.x += this.vx; this.y += this.vy; this.rot += this.rotSpd;
            if (this.y > window.innerHeight + 50 || this.x < -50 || this.x > window.innerWidth + 50) this.init(false); 
        }
        draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot); ctx.globalAlpha = this.op; ctx.font = `${this.size}px serif`; ctx.textAlign = 'center'; ctx.fillText(this.emoji, 0, 0); ctx.restore(); }
    }
    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        emojis = Array.from({length: 15}, () => new FloatingEmoji());
    }
    function anim() { 
        ctx.clearRect(0,0,canvas.width,canvas.height); 
        emojis.forEach(e => { e.update(); e.draw(); }); 
        requestAnimationFrame(anim); 
    }
    window.addEventListener('resize', initCanvas);
    initCanvas(); anim();
</script>
