<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = '../'; } 
        else {
            document.getElementById('dashboardContent').style.display = 'flex';
            let username = user.user_metadata?.username;
            if (!username) username = '@' + user.email.split('@')[0];
            document.getElementById('userNameDisplay').innerText = username.toUpperCase();
        }
    }

    async function logOut() {
        await _supabase.auth.signOut();
        window.location.href = '../';
    }
    checkUser();

    // --- СУПЕР-СТАБИЛЬНЫЕ ЧАСТИЦЫ ---
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.1,
                opacity: Math.random() * 0.5 + 0.2,
                color: Math.random() > 0.5 ? '#ffffff' : '#ff4b2b'
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.opacity;
            ctx.fill();
            
            p.y -= p.speed;
            if (p.y < -10) {
                p.y = canvas.height + 10;
                p.x = Math.random() * canvas.width;
            }
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    draw();
</script>
