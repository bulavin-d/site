<script>

    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Проверка авторизации при загрузке
    async function checkUser() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            // Если не вошел — кидаем обратно на главную
            window.location.href = 'index.html';

    }
    checkUser();

    // Функция выхода
    async function logout() {
        await _supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    /* --- АНИМАЦИЯ ФОНА (ТА ЖЕ) --- */
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let emojis = [];
    class FloatingEmoji {
        constructor() { this.init(true); }
        init(f) {
            this.x = Math.random() * window.innerWidth;
            this.y = f ? Math.random() * window.innerHeight : -50;
            this.emoji = ['🖤', '🎧', '✨'][Math.floor(Math.random() * 3)];
            this.size = Math.random() * 20 + 20;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
            this.op = Math.random() * 0.2 + 0.05;
        }
        update() { 
            this.x += this.vx; this.y += this.vy;
            if (this.y > window.innerHeight + 50 || this.x < -50 || this.x > window.innerWidth + 50) this.init(false); 
        }
        draw() { ctx.globalAlpha = this.op; ctx.font = `${this.size}px serif`; ctx.fillText(this.emoji, this.x, this.y); }
    }
    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        emojis = Array.from({length: 15}, () => new FloatingEmoji());
    }
    function anim() { 
        ctx.clearRect(0,0,canvas.width,canvas.height); 
        emojis.forEach(e => { e.update(); e.draw(); }); 
        requestAnimationFrame(anim); 
    }
    window.addEventListener('resize', initCanvas);
    initCanvas(); anim();
</script>
