<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BULAVIN | INNER CIRCLE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="https://em-content.zobj.net/source/apple/354/black-heart_1f5a4.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --red-accent: #ff4b2b;
        }

        /* --- ФИКС ДЛЯ МОБИЛОК (БЛОКИРОВКА "РЕЗИНКИ") --- */
        html, body {
            width: 100%;
            height: 100%; /* Жестко фиксируем высоту */
            margin: 0; padding: 0;
            overflow: hidden; /* Запрещаем скролл фона */
            overscroll-behavior: none; /* Убиваем эффект перетягивания на iOS/Android */
            background: #000; color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* ----------------------------------------------- */

        body { display: flex; justify-content: center; align-items: center; }
        * { box-sizing: border-box; }
        
        #global-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        /* Уменьшил блюр фона, чтобы новые частицы были четче видны */
        .dynamic-bg { position: fixed; inset: 0; background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center; background-size: cover; filter: blur(60px) brightness(0.15); transform: scale(1.1); z-index: -2; }
        
        .container { width: 100%; max-width: 420px; padding: 20px; display: flex; flex-direction: column; z-index: 5; position: relative; gap: 15px; opacity: 0; animation: fadeIn 2s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .dashboard-card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            padding: 60px 30px 50px; 
            border-radius: 40px; 
            text-align: center; 
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        .logout-btn {
            position: absolute; top: 20px; right: 20px;
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.6); 
            border-radius: 12px; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s ease;
        }
        .logout-btn i { font-size: 16px; }
        .logout-btn:hover { 
            color: var(--red-accent);
            border-color: rgba(255, 75, 43, 0.4);
            background: rgba(255, 75, 43, 0.1);
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.3);
            transform: scale(1.05);
        }

        h1 { font-size: 22px; letter-spacing: 4px; font-weight: 900; margin-bottom: 40px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .soul-text {
            font-size: 13px; font-weight: 300; line-height: 2; opacity: 0.8; 
            margin-bottom: 45px; letter-spacing: 0.5px;
            max-width: 320px; 
        }
        .soul-text span { 
            display: block;
            margin-top: 20px;
            font-size: 15px;
            color: #fff; font-weight: 700; opacity: 1; 
            text-shadow: 0 0 15px rgba(255,255,255,0.4); 
            letter-spacing: 1.5px;
        }

        .merge-btn { 
            position: relative; width: 100%; padding: 22px; border-radius: 20px; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; font-weight: 900; font-size: 14px; letter-spacing: 6px; cursor: pointer; 
            transition: all 0.5s ease; text-transform: uppercase; text-decoration: none;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            animation: heartbeat 3s infinite;
        }
        @keyframes heartbeat { 
            0% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.4); border-color: rgba(255, 255, 255, 0.6); }
            100% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        }
        .merge-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .merge-btn:active { transform: scale(0.96); }
        .merge-btn i { font-size: 22px; opacity: 0.9; }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

<canvas id="global-canvas"></canvas>
<div class="dynamic-bg"></div>

<div class="container" id="dashboardContent" style="display: none;">
    <div class="dashboard-card">
        <button class="logout-btn" onclick="logOut()">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
        
        <h1 id="userNameDisplay">@USER</h1>

        <div class="soul-text">
            Я отдаю тебе свою душу в каждом новом треке и в каждой строчке. Поэтому я уже часть тебя, а ты — часть меня.
            <span>Нам нужно абсолютное слияние.</span>
        </div>

        <a href="https://t.me/imbulavin_bot" target="_blank" class="merge-btn">
            <i class="fa-solid fa-fingerprint"></i>
            СЛИЯНИЕ
        </a>
    </div>
    <div class="footer">© 2026 BULAVIN SYSTEM</div>
</div>

<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = '../'; } 
        else {
            document.getElementById('dashboardContent').style.display = 'flex';
            let username = user.user_metadata?.username;
            if (!username) username = '@' + user.email.split('@')[0];
            document.getElementById('userNameDisplay').innerText = username.toUpperCase();
        }
    }

    async function logOut() {
        await _supabase.auth.signOut();
        window.location.href = '../';
    }
    checkUser();

    // --- НОВАЯ СИСТЕМА СЛИЯНИЯ ДУШ ---
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let souls = [];
    let mergingPairs = [];
    const MERGE_DISTANCE = 60; // Дистанция, при которой начинается слияние

    // Класс для обычной летающей души
    class Soul {
        constructor(type) {
            this.type = type; // 'white' или 'red'
            this.reset();
        }
        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.radius = Math.random() * 15 + 10; // Размер сгустка
            this.alpha = Math.random() * 0.3 + 0.2;
            this.isMerging = false;
        }
        update() {
            if (this.isMerging) return;
            this.x += this.vx; this.y += this.vy;
            // Отталкивание от границ
            if (this.x < 0 || this.x > width) this.vx *= -1;
            if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw(context) {
            if (this.isMerging) return;
            drawGlowingSoul(context, this.x, this.y, this.radius, this.type, this.alpha);
        }
    }

    // Класс для анимации слияния двух душ
    class MergingPair {
        constructor(soul1, soul2) {
            this.s1 = soul1; this.s2 = soul2;
            // Находим центр слияния
            this.centerX = (soul1.x + soul2.x) / 2;
            this.centerY = (soul1.y + soul2.y) / 2;
            this.progress = 0; // Прогресс анимации (0 -> 1)
            this.finished = false;
        }
        update() {
            this.progress += 0.008; // Скорость слияния
            if (this.progress >= 1) {
                this.finished = true;
                this.s1.reset(); this.s2.reset(); // Возвращаем души в мир
            }
            // Двигаем души к центру
            this.s1.x += (this.centerX - this.s1.x) * 0.05;
            this.s1.y += (this.centerY - this.s1.y) * 0.05;
            this.s2.x += (this.centerX - this.s2.x) * 0.05;
            this.s2.y += (this.centerY - this.s2.y) * 0.05;
        }
        draw(ctx) {
            const fade = 1 - this.progress; // Исчезновение исходных душ
            drawGlowingSoul(ctx, this.s1.x, this.s1.y, this.s1.radius*(1-this.progress*0.5), this.s1.type, this.s1.alpha * fade);
            drawGlowingSoul(ctx, this.s2.x, this.s2.y, this.s2.radius*(1-this.progress*0.5), this.s2.type, this.s2.alpha * fade);

            // Рисуем центральную вспышку слияния
            if (this.progress > 0.3) {
                const mergeAlpha = Math.sin(this.progress * Math.PI) * 0.8; // Плавное появление и затухание
                const mergeRadius = (this.s1.radius + this.s2.radius) * (this.progress + 0.5);
                // Смешанный цвет (бело-красный)
                const gradient = ctx.createRadialGradient(this.centerX, this.centerY, 0, this.centerX, this.centerY, mergeRadius);
                gradient.addColorStop(0, `rgba(255, 200, 200, ${mergeAlpha})`);
                gradient.addColorStop(0.5, `rgba(255, 75, 43, ${mergeAlpha * 0.5})`);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.beginPath(); ctx.arc(this.centerX, this.centerY, mergeRadius, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    // Функция рисования одной души (градиентный сгусток)
    function drawGlowingSoul(ctx, x, y, r, type, alpha) {
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
        if (type === 'white') {
            gradient.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
            gradient.addColorStop(0.6, `rgba(200, 220, 255, ${alpha * 0.3})`);
        } else {
            gradient.addColorStop(0, `rgba(255, 100, 100, ${alpha})`);
            gradient.addColorStop(0.6, `rgba(255, 75, 43, ${alpha * 0.3})`);
        }
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        // Рисуем чуть сплюснутый круг для органичности
        ctx.ellipse(x, y, r * 1.2, r * 0.9, Math.random()*0.1, 0, Math.PI * 2);
        ctx.fill();
    }

    function initCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        // Создаем равное количество белых и красных душ
        souls = [];
        for(let i=0; i<12; i++) souls.push(new Soul('white'));
        for(let i=0; i<12; i++) souls.push(new Soul('red'));
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);

        // Проверка на слияние
        for (let i = 0; i < souls.length; i++) {
            if (souls[i].type !== 'white' || souls[i].isMerging) continue;
            for (let j = 0; j < souls.length; j++) {
                if (souls[j].type !== 'red' || souls[j].isMerging) continue;

                const dx = souls[i].x - souls[j].x;
                const dy = souls[i].y - souls[j].y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < MERGE_DISTANCE) {
                    souls[i].isMerging = true;
                    souls[j].isMerging = true;
                    mergingPairs.push(new MergingPair(souls[i], souls[j]));
                    break; // Эта белая душа нашла пару в этом кадре
                }
            }
        }

        // Обновляем и рисуем свободные души
        souls.forEach(s => { s.update(); s.draw(ctx); });

        // Обновляем и рисуем слияния
        mergingPairs.forEach((pair, index) => {
            pair.update(); pair.draw(ctx);
            if (pair.finished) mergingPairs.splice(index, 1);
        });

        requestAnimationFrame(animate);
    }
    
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(initCanvas, 200);
    });

    initCanvas();
    animate();
</script>
</body>
</html>
