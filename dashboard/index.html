<div class="dynamic-bg"></div>
<canvas id="global-canvas"></canvas>

<div class="container" id="dashboardContent" style="display:none;">
    <div class="dashboard-card">
        <button class="logout-icon" onclick="logOut()">
            <i class="fa-solid fa-power-off" style="font-size:13px;"></i>
        </button>
        <h1 id="userNameDisplay">@USER</h1>
        <div class="soul-text">
            <p>Здесь нет лишних глаз.</p>
            <p>Только ты и твои мысли.</p>
            <p>Что бы ты сказал мне, если бы знал, что я точно услышу?</p>
            <p>Если ты хочешь выговориться — вперёд.</p>
        </div>
        <button class="anon-btn" onclick="openAnon()">
            <i class="fa-solid fa-mask"></i> АНОНИМНОЕ СООБЩЕНИЕ
        </button>
        <a href="https://t.me/imbulavin_bot" target="_blank" rel="noopener" class="merge-link">
            <i class="fa-solid fa-fingerprint"></i> СЛИЯНИЕ
        </a>
    </div>
    <div class="footer">© 2026 BULAVIN SYSTEM</div>
</div>

<div class="anon-modal" id="anonModal" onclick="if(event.target===this)closeAnon()">
    <div class="anon-card" onclick="event.stopPropagation()">
        <form id="anonForm">
            <textarea class="anon-textarea" id="anonMessage" rows="5" placeholder="Пиши всё, что у тебя на уме..." required></textarea>
            <button type="submit" class="btn-action" id="submitBtn">ОТПРАВИТЬ</button>
        </form>
    </div>
</div>

<script src="/js/config.js"></script>
<script>
    // GOOGLE APPS SCRIPT (анонимные сообщения) — не трогать
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyWjPndo7PxgFsZRXK7SmqS9K3pHPD2A4OjuBrDoz7kmG82XOeZc_2zrlx7083yOEEMIw/exec';
    let currentUsername = '@Unknown';

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = '../'; return; }
        document.getElementById('dashboardContent').style.display = 'flex';
        currentUsername = user.user_metadata?.username || ('@' + user.email.split('@')[0]);
        document.getElementById('userNameDisplay').innerText = currentUsername.toUpperCase();
    }
    async function logOut() { await _supabase.auth.signOut(); window.location.href = '../'; }
    checkUser();

    function openAnon()  { document.getElementById('anonModal').classList.add('show'); }
    function closeAnon() { document.getElementById('anonModal').classList.remove('show'); }

    document.getElementById('anonForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('anonMessage').value;
        btn.disabled = true; btn.innerText = 'СВЯЗЬ...';
        const fd = new FormData();
        fd.append('message', msg); fd.append('username', currentUsername);
        fetch(scriptURL, { method: 'POST', body: fd })
            .then(() => {
                btn.innerText = 'ГОТОВО';
                document.getElementById('anonForm').reset();
                setTimeout(() => { closeAnon(); btn.disabled = false; btn.innerText = 'ОТПРАВИТЬ'; }, 1500);
            })
            .catch(() => { alert('Ошибка системы'); btn.disabled = false; btn.innerText = 'ОТПРАВИТЬ'; });
    });

    // Floating ? canvas
    const canvas = document.getElementById('global-canvas');
    const ctx    = canvas.getContext('2d');
    let questions = [], lastW = window.innerWidth;
    class FloatingQuestion {
        constructor() { this.init(true); }
        init(f) {
            this.x = Math.random() * window.innerWidth;
            this.y = f ? Math.random() * window.innerHeight : window.innerHeight + 50;
            this.size  = Math.random() * 20 + 15;
            this.speed = Math.random() * 0.4 + 0.1;
            this.op    = Math.random() * 0.13 + 0.04;
            this.wobble = Math.random() * Math.PI * 2;
            this.ws     = Math.random() * 0.02 + 0.01;
        }
        update() { this.y -= this.speed; this.x += Math.sin(this.wobble) * 0.5; this.wobble += this.ws; if(this.y < -50) this.init(false); }
        draw()   { ctx.save(); ctx.globalAlpha=this.op; ctx.fillStyle='#fff'; ctx.font=`bold ${this.size}px Inter,sans-serif`; ctx.textAlign='center'; ctx.fillText('?',this.x,this.y); ctx.restore(); }
    }
    function initC() {
        if(Math.abs(lastW-window.innerWidth)>50||!questions.length){
            canvas.width=window.innerWidth; canvas.height=window.innerHeight; lastW=window.innerWidth;
            questions=Array.from({length:25},()=>new FloatingQuestion());
        } else { canvas.height=window.innerHeight; }
    }
    function animC() { ctx.clearRect(0,0,canvas.width,canvas.height); questions.forEach(q=>{q.update();q.draw();}); requestAnimationFrame(animC); }
    window.addEventListener('resize',initC); initC(); animC();
</script>
</body>
