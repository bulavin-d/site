<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BULAVIN | DASHBOARD</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="https://em-content.zobj.net/source/apple/354/black-heart_1f5a4.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --verify-blue: #0095f6;
            --red-accent: #ff4b2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { 
            background: #000; 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none;
        }
        
        .container { width: 100%; max-width: 420px; padding: 40px 20px; display: flex; flex-direction: column; gap: 15px; z-index: 5; position: relative; }

        /* ИКОНКА ВЫХОДА ВМЕСТО ПРОФИЛЯ */
        .auth-nav { position: absolute; top: 20px; right: 20px; z-index: 25; }
        .logout-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .logout-btn:hover { background: rgba(255,75,43,0.2); border-color: var(--red-accent); color: var(--red-accent); }

        .qr-nav { position: absolute; top: 20px; left: 20px; z-index: 25; }
        .qr-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .qr-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }

        .profile-card { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 50px 20px 30px; text-align: center; margin-bottom: 10px; }
        h1 { font-size: 20px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        .user-welcome { font-size: 11px; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; }

        /* МОДАЛКИ */
        .glass-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(25px); }
        .glass-modal.show { display: flex; animation: glassFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes glassFadeIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        .glass-card { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); padding: 35px 30px; border-radius: 40px; display: flex; flex-direction: column; align-items: center; backdrop-filter: blur(30px); width: 90%; max-width: 350px; }

        /* КНОПКА АНОНКИ С НЕОНОМ */
        .btn-anon { 
            width: 100%; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 20px; 
            border-radius: 25px; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 13px; 
            font-weight: 800; 
            letter-spacing: 2px;
            text-decoration: none;
        }
        .btn-anon i { font-size: 18px; animation: neon-pulse 2s infinite alternate; }
        .btn-anon:hover { transform: translateY(-2px); border-color: #fff; background: rgba(255,255,255,0.15); }

        @keyframes neon-pulse {
            0% { text-shadow: 0 0 5px rgba(255,255,255,0.2); transform: scale(1); }
            100% { text-shadow: 0 0 15px rgba(255,255,255,0.8); transform: scale(1.1); }
        }

        .anon-textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; color: #fff; resize: none; outline: none; margin-bottom: 15px; font-size: 14px; line-height: 1.5; }
        .btn-action { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; font-weight: 800; font-size: 12px; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-action:hover { background: #fff; color: #000; }

        #global-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: grayscale(1) brightness(0.4); pointer-events: none; }
        .dynamic-bg { position: fixed; inset: 0; background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center; background-size: cover; filter: blur(100px) brightness(0.2); z-index: -2; }
        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 30px; letter-spacing: 2px; }

        /* QR */
        .qr-image-wrapper { background: #fff; padding: 15px; border-radius: 25px; margin-bottom: 20px; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; }
        .qr-image-wrapper img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<canvas id="global-canvas"></canvas>
<div class="dynamic-bg"></div>

<div class="container">
    <div class="qr-nav">
        <button class="qr-btn" onclick="openQR()">
            <i class="fa-solid fa-qrcode"></i>
        </button>
    </div>

    <div class="auth-nav">
        <button class="logout-btn" onclick="handleLogout()">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </div>

    <div class="profile-card">
        <h1 id="display-name">СИСТЕМА</h1>
        <div class="user-welcome">ЛИЧНЫЙ ДОСТУП ПОДТВЕРЖДЕН</div>
    </div>

    <div style="text-align: center; padding: 20px 10px;">
        <p style="font-size: 12px; opacity: 0.6; line-height: 1.6; letter-spacing: 1px; text-transform: uppercase;">
            ТЫ МОЖЕШЬ ОСТАВИТЬ АНОНИМНЫЙ СЛЕД В СИСТЕМЕ. ТВОЕ ИМЯ УЗНАЕТ ТОЛЬКО СОЗДАТЕЛЬ.
        </p>
    </div>

    <button class="btn-anon" onclick="openAnonModal()">
        <i class="fa-solid fa-mask"></i><span>ОСТАВИТЬ СЛЕД</span>
    </button>

    <div class="footer">© 2026 BULAVIN SYSTEM</div>
</div>

<div class="glass-modal" id="qrModal" onclick="closeQR()">
    <div class="glass-card" onclick="event.stopPropagation()">
        <div class="qr-image-wrapper">
            <img src="../qr-code.png" alt="QR">
        </div>
        <div style="font-size: 18px; letter-spacing: 5px; font-weight: 900;">BULAVIN.SPACE</div>
    </div>
</div>

<div class="glass-modal" id="anonModal" onclick="closeAnonModal()">
    <div class="glass-card" onclick="event.stopPropagation()">
        <form id="anon-form" style="width: 100%;">
            <textarea class="anon-textarea" id="anon-text" name="message" rows="5" placeholder="Напиши то, что должен знать только я..." required></textarea>
            <button type="submit" class="btn-action" id="anon-submit-btn">ПРОДОЛЖИТЬ</button>
        </form>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // URL ТВОЕЙ ТАБЛИЦЫ (GOOGLE SCRIPT)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz6FqqfvQSiwbm-xmuo0-dFkvReYjjKsqyzEYojdO1tfigGVMz0nb93YpjO9fOZLvRLRQ/exec';

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) {
            window.location.href = '../';
            return;
        }
        const username = user.user_metadata.username || 'USER';
        document.getElementById('display-name').innerText = username.toUpperCase();
    }
    checkUser();

    async function handleLogout() {
        await _supabase.auth.signOut();
        window.location.href = '../';
    }

    function openQR() { document.getElementById('qrModal').classList.add('show'); }
    function closeQR() { document.getElementById('qrModal').classList.remove('show'); }
    
    function openAnonModal() { document.getElementById('anonModal').classList.add('show'); }
    function closeAnonModal() { document.getElementById('anonModal').classList.remove('show'); }

    // ЛОГИКА ОТПРАВКИ С ИМЕНЕМ
    const form = document.getElementById('anon-form');
    const submitBtn = document.getElementById('anon-submit-btn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = 'СВЯЗЬ...';

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            const username = user?.user_metadata?.username || 'Unknown';
            const message = document.getElementById('anon-text').value;

            // Формируем данные для таблицы
            const formData = new FormData();
            formData.append('message', message);
            formData.append('username', username); // ЭТОТ КЛЮЧ ДОЛЖЕН БЫТЬ В СКРИПТЕ ТАБЛИЦЫ

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(() => {
                    submitBtn.innerText = 'ГОТОВО';
                    form.reset();
                    setTimeout(() => { closeAnonModal(); submitBtn.disabled = false; submitBtn.innerText = 'ПРОДОЛЖИТЬ'; }, 1500);
                })
                .catch(err => {
                    alert('Ошибка отправки');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'ПРОДОЛЖИТЬ';
                });
        } catch (error) {
            console.error(error);
        }
    });

    // ФИКС ЭМОДЗИ ДЛЯ МОБИЛОК
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let emojis = [];
    let lastWidth = window.innerWidth;

    class FloatingEmoji {
        constructor() { this.init(true); }
        init(f) {
            this.x = Math.random() * window.innerWidth;
            this.y = f ? Math.random() * window.innerHeight : -50;
            this.emoji = ['🖤', '💼', '🎧'][Math.floor(Math.random() * 3)];
            this.size = Math.random() * 20 + 20;
            this.vx = (Math.random() - 0.5) * 0.4;
            this.vy = (Math.random() - 0.5) * 0.4;
            this.rot = Math.random() * Math.PI * 2;
            this.rotSpd = (Math.random() - 0.5) * 0.01;
            this.op = Math.random() * 0.15 + 0.05;
        }
        update() { 
            this.x += this.vx; this.y += this.vy; this.rot += this.rotSpd; 
            if (this.y > window.innerHeight + 50 || this.x < -50 || this.x > window.innerWidth + 50) this.init(false); 
        }
        draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot); ctx.globalAlpha = this.op; ctx.font = `${this.size}px serif`; ctx.textAlign = 'center'; ctx.fillText(this.emoji, 0, 0); ctx.restore(); }
    }

    function initCanvas() {
        const isWidthChanged = Math.abs(lastWidth - window.innerWidth) > 50;
        if(isWidthChanged || emojis.length === 0) {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            lastWidth = window.innerWidth;
            emojis = Array.from({length: 15}, () => new FloatingEmoji());
        } else {
            canvas.height = window.innerHeight;
        }
    }

    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); emojis.forEach(e => { e.update(); e.draw(); }); requestAnimationFrame(anim); }
    window.addEventListener('resize', initCanvas);
    initCanvas(); anim();
</script>
</body>
</html>
