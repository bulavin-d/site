<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BULAVIN | INNER CIRCLE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="https://em-content.zobj.net/source/apple/354/black-heart_1f5a4.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --red-accent: #ff4b2b;
        }

        /* --- ФИКС ДЛЯ МОБИЛОК --- */
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            overflow: hidden; overscroll-behavior: none;
            background: #050505; color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body { display: flex; justify-content: center; align-items: center; }
        * { box-sizing: border-box; }
        
        #global-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .dynamic-bg { position: fixed; inset: 0; background: url('https://avatars.yandex.net/get-music-content/16464214/8bceb93a.p.24009925/m1000x1000') no-repeat center center; background-size: cover; filter: blur(70px) brightness(0.25); transform: scale(1.1); z-index: -2; }
        
        .container { width: 100%; max-width: 420px; padding: 20px; display: flex; flex-direction: column; z-index: 5; position: relative; opacity: 0; animation: fadeIn 2s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .dashboard-card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            padding: 60px 25px 50px; 
            border-radius: 40px; 
            text-align: center; 
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        .logout-btn {
            position: absolute; top: 20px; right: 20px;
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.6); 
            border-radius: 12px; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s ease;
        }
        .logout-btn i { font-size: 16px; }
        .logout-btn:hover { 
            color: var(--red-accent); border-color: rgba(255, 75, 43, 0.4);
            background: rgba(255, 75, 43, 0.1); box-shadow: 0 0 15px rgba(255, 75, 43, 0.3);
            transform: scale(1.05);
        }

        h1 { font-size: 22px; letter-spacing: 4px; font-weight: 900; margin-bottom: 40px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* --- ИДЕАЛЬНАЯ ВЕРСТКА ТЕКСТА --- */
        .soul-text {
            font-size: 13px; font-weight: 300; line-height: 1.8; opacity: 0.8; 
            margin-bottom: 45px; letter-spacing: 0.5px;
            width: 100%;
        }
        .soul-text p { margin-bottom: 15px; }
        .soul-text span { 
            display: block; margin-top: 25px; font-size: 14px;
            color: #fff; font-weight: 800; opacity: 1; 
            text-shadow: 0 0 15px rgba(255,255,255,0.5); 
            letter-spacing: 2px; text-transform: uppercase;
        }

        .merge-btn { 
            position: relative; width: 100%; padding: 22px; border-radius: 20px; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; font-weight: 900; font-size: 14px; letter-spacing: 6px; cursor: pointer; 
            transition: all 0.5s ease; text-transform: uppercase; text-decoration: none;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            animation: heartbeat 3s infinite;
        }
        @keyframes heartbeat { 
            0% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.4); border-color: rgba(255, 255, 255, 0.6); }
            100% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        }
        .merge-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .merge-btn:active { transform: scale(0.96); }
        .merge-btn i { font-size: 22px; opacity: 0.9; }

        .footer { text-align: center; font-size: 10px; opacity: 0.2; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

<canvas id="global-canvas"></canvas>
<div class="dynamic-bg"></div>

<div class="container" id="dashboardContent" style="display: none;">
    <div class="dashboard-card">
        <button class="logout-btn" onclick="logOut()">
            <i class="fa-solid fa-door-open"></i>
        </button>
        
        <h1 id="userNameDisplay">@USER</h1>

        <div class="soul-text">
            <p>Я отдаю тебе свою душу<br>в каждом новом треке и в каждой строчке.</p>
            <p>Поэтому я уже часть тебя,<br>а ты — часть меня.</p>
            <span>Нам нужно абсолютное слияние.</span>
        </div>

        <a href="https://t.me/imbulavin_bot" target="_blank" class="merge-btn">
            <i class="fa-solid fa-fingerprint"></i>
            СЛИЯНИЕ
        </a>
    </div>
    <div class="footer">© 2026 BULAVIN SYSTEM</div>
</div>

<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = '../'; } 
        else {
            document.getElementById('dashboardContent').style.display = 'flex';
            let username = user.user_metadata?.username;
            if (!username) username = '@' + user.email.split('@')[0];
            document.getElementById('userNameDisplay').innerText = username.toUpperCase();
        }
    }

    async function logOut() {
        await _supabase.auth.signOut();
        window.location.href = '../';
    }
    checkUser();

    // --- СТАБИЛЬНЫЙ ДВИЖОК СЛИЯНИЯ ДУШ ---
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let souls = [];

    class Soul {
        constructor(type) {
            this.type = type; // 'white' или 'red'
            this.reset();
            // Раскидываем их сразу по всему экрану, чтобы не было кучи при старте
            this.x = Math.random() * window.innerWidth;
            this.y = Math.random() * window.innerHeight;
        }
        reset() {
            this.x = Math.random() * window.innerWidth;
            this.y = window.innerHeight + 50; // Появляются снизу
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = -(Math.random() * 0.5 + 0.3); // Медленно плывут вверх
            this.baseRadius = Math.random() * 20 + 15;
            this.radius = this.baseRadius;
            this.alpha = Math.random() * 0.3 + 0.1;
            this.target = null;
            this.isMerging = false;
        }
        draw(ctx) {
            if (this.radius < 0.1) return; // Защита от краша
            ctx.beginPath();
            let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2);
            if (this.type === 'white') {
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            } else {
                grad.addColorStop(0, `rgba(255, 75, 43, ${this.alpha})`);
                grad.addColorStop(1, 'rgba(255, 75, 43, 0)');
            }
            ctx.fillStyle = grad;
            ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
            ctx.fill();
        }
        update(allSouls) {
            if (!this.isMerging) {
                this.x += this.vx; 
                this.y += this.vy;
                
                // Если улетели за экран - перерождаются
                if (this.y < -100 || this.x < -100 || this.x > width + 100) {
                    this.reset();
                }

                // Ищем пару, если её еще нет (белые ищут красных)
                if (!this.target && this.type === 'white') {
                    for (let i = 0; i < allSouls.length; i++) {
                        let other = allSouls[i];
                        if (other.type === 'red' && !other.target && !other.isMerging) {
                            let dx = this.x - other.x;
                            let dy = this.y - other.y;
                            if (dx * dx + dy * dy < 15000) { // Если подлетели близко
                                this.target = other;
                                other.target = this;
                                break;
                            }
                        }
                    }
                }
            }

            // Логика слияния
            if (this.target) {
                let dx = this.target.x - this.x;
                let dy = this.target.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                // Притягиваемся друг к другу
                if (!this.isMerging) {
                    this.x += dx * 0.015;
                    this.y += dy * 0.015;
                }

                // Когда коснулись — вспышка и исчезновение
                if (dist < 5 || this.isMerging) {
                    this.isMerging = true;
                    this.radius += 1.5; // Раздуваемся
                    this.alpha -= 0.02; // Затухаем
                    if (this.alpha <= 0) {
                        this.target.reset(); // Сбрасываем пару
                        this.reset(); // Сбрасываем себя
                    }
                }
            }
        }
    }

    function initCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        souls = [];
        // Создаем 12 пар душ
        for(let i=0; i<12; i++) {
            souls.push(new Soul('white'));
            souls.push(new Soul('red'));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        souls.forEach(s => { 
            s.update(souls); 
            s.draw(ctx); 
        });
        requestAnimationFrame(animate);
    }
    
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(initCanvas, 200);
    });

    initCanvas();
    animate();
</script>
</body>
</html>
