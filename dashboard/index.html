<script>
    const SUPABASE_URL = 'https://uhqxtkuriccfimcnchuj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocXh0a3VyaWNjZmltY25jaHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTIzNjIsImV4cCI6MjA4NzQyODM2Mn0.juMhRq8oK1xB5gfRuROJur0DuwKqeZpke4ljGQLxYvI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = '../'; } 
        else {
            document.getElementById('dashboardContent').style.display = 'flex';
            let username = user.user_metadata?.username;
            if (!username) username = '@' + user.email.split('@')[0];
            document.getElementById('userNameDisplay').innerText = username.toUpperCase();
        }
    }

    async function logOut() {
        await _supabase.auth.signOut();
        window.location.href = '../';
    }
    checkUser();

    // --- УПРОЩЕННЫЙ ФОН: ПРОСТО ЛЕТАЮЩИЕ ЧАСТИЦЫ ---
    const canvas = document.getElementById('global-canvas');
    const ctx = canvas.getContext('2d');
    let souls = [];

    class SimpleSoul {
        constructor() {
            this.init();
            this.y = Math.random() * window.innerHeight;
        }
        init() {
            this.x = Math.random() * window.innerWidth;
            this.y = window.innerHeight + 20;
            this.size = Math.random() * 2 + 1;
            this.vy = -(Math.random() * 0.3 + 0.1);
            this.vx = (Math.random() - 0.5) * 0.2;
            this.color = Math.random() > 0.5 ? '255, 255, 255' : '255, 75, 43';
            this.opacity = Math.random() * 0.4 + 0.1;
        }
        update() {
            this.y += this.vy;
            this.x += this.vx;
            if (this.y < -20) this.init();
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
            ctx.fill();
        }
    }

    function setup() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        souls = Array.from({length: 40}, () => new SimpleSoul());
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        souls.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', setup);
    setup();
    loop();
</script>
